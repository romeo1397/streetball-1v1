  }

  function offense(brain, s, dt, ctrl) {
    var P = brain.P;
    brain.poss += dt;
    brain.oT += dt;

    /* mustClear：先运出三分线 */
    if (s.mustClear && s.distRim < TPR() + 0.4 &&
        brain.ostate !== 'CLEAR' && brain.ostate !== 'SHOOT' && brain.ostate !== 'DUNK') {
      brain.ostate = 'CLEAR'; brain.oT = 0;
    }

    /* 14 秒剩 <3s：强出手（可打断除出手外的一切状态） */
    if (s.shotClock > 0 && s.shotClock < 3.0 &&
        brain.ostate !== 'SHOOT' && brain.ostate !== 'DUNK' && brain.ostate !== 'POST') {
      if (s.distRim < 3.4 && !s.meAir) { rimAttack(brain, s, ctrl); }
      else { startShoot(brain, true); }
    }

    switch (brain.ostate) {
      case 'CLEAR': {
        if (!s.mustClear || s.distRim > TPR() + 0.5) {
          brain.ostate = 'SETUP'; brain.spot = null; brain.oT = 0; break;
        }
        var dirX = s.mx - s.rx, dirZ = s.mz - s.rz;
        var L = Math.sqrt(dirX * dirX + dirZ * dirZ);
        if (L < 0.1) { dirX = 0; dirZ = 1; L = 1; }
        seek(brain, s, clampX(s.rx + dirX / L * (TPR() + 1.2)),
                       clampZ(s.rz + dirZ / L * (TPR() + 1.2)), 1);
        ctrl.sprint = true;
        break;
      }

      case 'SETUP': {
        if (!brain.spot) brain.spot = pickSpot(brain, s);
        var d = seek(brain, s, brain.spot.x, brain.spot.z, 1);
        ctrl.sprint = d > 3.5;
        if (d < 0.7) { brain.ostate = 'MOVES'; brain.oT = 0; }
        break;
      }

      case 'MOVES': {
        brain.fancyT -= dt;
        /* v1.1 C1 背打起手（allstar/hof 20~35%）：E 进背打 → 顶 1.5~2.5s → 三选一 */
        if (brain.wantPost && !brain.postDone && !s.mustClear && !s.meAir &&
            s.distRim < 7.2 && s.distRim > 2.0) {
          brain.postDone = true;
          ctrl.post = true;
          brain.ostate = 'POSTUP'; brain.oT = 0;
          brain.postHold = rand(1.5, 2.5);
          brain.postMove = choose(['dream', 'fade', 'spin']);
          break;
        }
        /* 要位点附近小幅横移，保持活力（有平滑不抽搐） */
        if (brain.spot) seek(brain, s, brain.spot.x + brain.jx * 0.6, brain.spot.z + brain.jz * 0.4, 0.6);

        /* 防守人踉跄/摔倒：立刻攻筐 */
        if (s.foeStumbled) { brain.ostate = 'DECIDE'; break; }

        /* 连招窗口：0.6~1s 内接第二个不同花式，吃连招加成（GDD §5） */
        if (brain.comboAt > 0 && brain.t >= brain.comboAt) {
          brain.comboAt = 0;
          if (!s.meAir && brain.comboMove) {
            ctrl[brain.comboMove] = true;
            brain.lastFancy = brain.comboMove;
            brain.decideAt = brain.t + rand(0.15, 0.35); /* 连招后大概率立即进攻 */
          }
        } else if (brain.fancyT <= 0 && !s.meAir) {
          if (s.distFoe > 2.6) {
            /* 花式要在防守人 2.5m 内才有晃人判定：先贴近一点 */
            seek(brain, s, (s.mx + s.fx) / 2, (s.mz + s.fz) / 2, 0.8);
          } else {
            var mv = pickFancy(brain);
            ctrl[mv] = true;
            brain.lastFancy = mv;
            brain.fancyT = rand(P.fancyMin, P.fancyMax);
            if (Math.random() < P.comboChance) {
              brain.comboAt = brain.t + rand(0.6, 1.0);
              brain.comboMove = pickFancy(brain);
            } else {
              brain.decideAt = brain.t + rand(0.25, 0.5);
            }
          }
        }
        if (brain.decideAt > 0 && brain.t >= brain.decideAt) {
          brain.decideAt = 0; brain.ostate = 'DECIDE';
        }
        break;
      }

      case 'DECIDE': {
        var open = s.distFoe;
        var urgency = clamp((8 - s.shotClock) / 8, 0, 1);
        if (s.foeStumbled) {
          /* 防守人踉跄/摔倒 → 立刻冲刺突破 */
          brain.ostate = 'DRIVE'; brain.driveT = 0;
          brain.driveSide = (s.fx >= s.mx) ? -1 : 1;
        } else if (s.distRim < 3.4 && !s.meAir) {
          rimAttack(brain, s, ctrl);
        } else if (open > 1.9 && s.distRim < 7.6 && brain.t > brain.shootCd) {
          /* 空位：中距或三分跳投 */
          startShoot(brain, false);
        } else if (open < 2.2 && s.distRim > 5.2 && Math.random() < P.stepbackChance) {
          /* shotIQ 高的难度：后撤步接三分 */
          ctrl.stepback = true;
          brain.lastFancy = 'stepback';
          brain.ostate = 'STEPBACK'; brain.oT = 0;
        } else if (open < 2.0 && Math.random() < P.fakeChance) {
          /* 偶尔假投接突破 */
          ctrl.fake = true;
          brain.ostate = 'FAKEWAIT'; brain.oT = 0;
        } else if (Math.random() < P.driveIQ * 0.5 + urgency * 0.5) {
          brain.ostate = 'DRIVE'; brain.driveT = 0;
          brain.driveSide = (s.fx >= s.mx) ? -1 : 1;
        } else {
          /* 回去继续晃：很快接下一个花式 */
          brain.ostate = 'MOVES';
          brain.fancyT = Math.min(brain.fancyT, rand(0.8, 1.8));
        }
        break;
      }

      case 'DRIVE': {
        brain.driveT += dt;
        ctrl.sprint = true;
        if (s.distRim < 3.3) { rimAttack(brain, s, ctrl); break; }
        /* 先横向拉开一步再切入，路径呈弧线 */
        var off = brain.driveSide * clamp((s.distRim - 3) * 0.45, 0, 1.8);
        seek(brain, s, clampX(s.rx + off), clampZ(s.rz + 1.0), 1);
        if (brain.driveT > 2.4 && s.distRim > 4.5) {
          /* 突不进去：退出来重新组织 */
          brain.ostate = 'MOVES'; brain.spot = null;
          brain.ostate = 'SETUP';
          brain.fancyT = rand(0.6, 1.4);
        }
        break;
      }

      case 'STEPBACK': {
        /* 后撤动画有 root 位移，这里给一点向后方向感 */
        var bx2 = s.mx - s.rx, bz2 = s.mz - s.rz;
        var bl = Math.sqrt(bx2 * bx2 + bz2 * bz2) || 1;
        brain.wantX = bx2 / bl * 0.3; brain.wantZ = bz2 / bl * 0.3;
        if (brain.oT >= 0.45) startShoot(brain, false, RELEASE_PCT);
        break;
      }

      case 'FAKEWAIT': {
        if (brain.oT >= 0.35) {
          brain.ostate = 'DRIVE'; brain.driveT = 0;
          brain.driveSide = (s.fx >= s.mx) ? -1 : 1;
        }
        break;
      }

      case 'SHOOT': {
        /* 站定蓄力，按 shotIQ 的目标释放点松手 */
        brain.chargeT += dt;

    else if (brain.dstate === 'CHASE' && !beaten) { brain.dstate = 'POSITION'; brain.pressT = 0; }

      if (s.foeHasBall && sp < 0.5 && s.foeDistRim > 4.5) brain.pressT += dt;
      else brain.pressT = 0;
      if (brain.pressT > brain.pressNeed) {
        brain.dstate = 'PRESS'; brain.pressHold = rand(0.8, 1.8);
      }
    } else if (brain.dstate === 'PRESS') {
      brain.pressHold -= dt;
      if (sp > 2.5 || brain.pressHold <= 0 || s.foeDistRim < 4.0) {
        brain.dstate = 'POSITION'; brain.pressT = 0; brain.pressNeed = rand(0.5, 1.0);
      }
    }

    /* —— 站位目标 —— */
    var tx, tz;
    if (brain.dstate === 'CHASE') {
      /* 回追：跑向对方与篮筐连线中点 */
      tx = (s.fx + s.rx) / 2; tz = (s.fz + s.rz) / 2;
      ctrl.sprint = true;
    } else {
      var gap = brain.dstate === 'PRESS' ? 0.8 : 1.2;
      tx = s.fx + toRimFx / fl * gap + brain.jx * 0.4;
      tz = s.fz + toRimFz / fl * gap + brain.jz * 0.4;
    }
    /* 不持续顶撞对手：贴太近就沿人筐连线让开半步 */

        ctrl.steal = true;
        brain.stealCd = brain.t + rand(1.3, 2.4);

      clampZ(s.rz + 1.4), 0.9);

  function update(brain, dt, view) {
    var ctrl = blankCtrl();
    if (!brain || !brain.P) return ctrl;
    if (!(dt > 0) || !isFinite(dt)) dt = 1 / 60;
    if (dt > 0.1) dt = 0.1;

    var s = readView(view);

    brain.wantX = 0; brain.wantZ = 0;

    /* v1.1 C5 抢断结果评估：出手 0.6s 后对方仍持球 = 失败；连续两次失败 → 4s 冷却 */
    if (brain.stealEval > 0 && brain.t >= brain.stealEval) {
      if (brain.t - brain.stealEval < 1.0) {   /* 过期评估丢弃（模式切换耽搁） */
        if (s.foeHasBall) {
          brain.stealFails++;
          if (brain.stealFails >= 2) {
            brain.stealBanUntil = brain.t + 4;
            brain.stealFails = 0;
          }
        } else {
          brain.stealFails = 0;
        }
      }
      brain.stealEval = 0;
    }

    /* 节奏抖动：每 0.45~0.95s 换一次小偏移，配合平滑不会每帧抽搐 */
    brain.jitT -= dt;
    if (brain.jitT <= 0) {
      brain.jitT = rand(0.45, 0.95);
      brain.jx = rand(-0.3, 0.3);
      brain.jz = rand(-0.3, 0.3);
    }

    /* 顶层模式仲裁 */
    var mode = s.meHasBall ? 'OFF'
             : (s.ballLoose ? 'LOOSE'
             : (s.foeHasBall ? 'DEF'
             : (s.ballShot ? 'REB' : 'DEF')));
    if (mode !== brain.mode) resetMode(brain, mode);

    /* 自己踉跄/倒地：不乱输入，动作由 game.js 播放 */
    if (s.meStumbled) {
      finalizeMove(brain, s, dt, ctrl, 4);
      return sanitize(ctrl);
    }

    /* v1.2 C3 训练模式：拿到球不进攻，原地站住等 game 1s 后收走球权 */
    if (s.training && s.meHasBall) {
      brain.wantX = 0;
      brain.wantZ = 0;
      finalizeMove(brain, s, dt, ctrl, 9);
      return sanitize(ctrl);
    }

    if (mode === 'OFF') offense(brain, s, dt, ctrl);
    else if (mode === 'DEF') defense(brain, s, dt, ctrl);
    else if (mode === 'LOOSE') loose(brain, s, dt, ctrl);
    else rebound(brain, s, dt, ctrl);

    finalizeMove(brain, s, dt, ctrl, 9);
    return sanitize(ctrl);
  }

  BB.AI = { create: create, update: update };
})();

      p.pos.z = clamp(p.pos.z, MINZ - 1.2, MAXZ + 1.2);
    }
    /* 朝向：持球人朝移动方向缓转；防守人面向持球人；无球追球 */
    var sp = speedOf(p);
    var tf = p.facing;
    if (p.hasBall) {
      if (sp > 0.5) tf = Math.atan2(p.vel.x, p.vel.z);
      else tf = Math.atan2(G.rimV.x - p.pos.x, G.rimV.z - p.pos.z);
    } else if (defending) {
      var h = G.players[other(p.idx)];
      if (h) tf = Math.atan2(h.pos.x - p.pos.x, h.pos.z - p.pos.z);
    } else if (G.ball) {
      if (sp > 2) tf = Math.atan2(p.vel.x, p.vel.z);
      else tf = Math.atan2(G.ball.pos.x - p.pos.x, G.ball.pos.z - p.pos.z);
    }
    p.facing = angLerp(p.facing, tf, 1 - Math.exp(-10 * dt));
  }
  /* 玩家圆碰撞推开 r=0.35 */
  function resolveCollision () {
    var a = G.players[0], b = G.players[1];
    if (!a || !b) return;
    if (a.state === 'dunk' || b.state === 'dunk') return;
    var dx = b.pos.x - a.pos.x, dz = b.pos.z - a.pos.z;
    var d = Math.sqrt(dx * dx + dz * dz);
    var min = PLAYER_R * 2;
    if (d < 0.0001) { a.pos.x -= 0.05; b.pos.x += 0.05; return; }
    if (d < min) {
      var push = (min - d) / 2;
      dx /= d; dz /= d;
      a.pos.x -= dx * push; a.pos.z -= dz * push;
      b.pos.x += dx * push; b.pos.z += dz * push;
    }
  }
  function syncPlayer (p) {
    if (!p || !p.ch || !p.ch.group) return;
    p.ch.group.position.set(p.pos.x, p.pos.y, p.pos.z);
    p.ch.group.rotation.y = p.facing;
  }

  /* ---------- 动画选择（normal 态） ---------- */
  function selectAnim (p) {
    if (!p || p.state !== 'normal') return;
    var sp = speedOf(p);
    if (p.hasBall) {
      if (p.postUp) {
        /* v1.1 背打：移动=顶人推进，静止=背身持球循环（clip 缺失则跳过） */
        if (sp > 0.35) playClip(p, 'post_backdown', { loop: true });
        else playClip(p, 'post_idle', { loop: true });
        return;
      }
      if (sp > 5.2) playClip(p, 'sprint_ball', { loop: true });
      else if (sp > 0.7) playClip(p, 'run_ball', { loop: true });
      else if (G.phase === 'check') playClip(p, 'idle_ball', { loop: true });
      else playClip(p, 'dribble_idle', { loop: true });
      return;
    }
    var foe = G.players[other(p.idx)];
    if (p.celebrateT > 0 && sp < 0.5) { playClip(p, 'celebrate_point', { loop: true }); return; }
    var defending = isDefending(p);
    if (defending && foe && foe.state === 'shoot' && pdist(p, foe) < 1.9) {
      playClip(p, 'contest', { loop: false });
      return;
    }
    if (defending && sp > 0.6) { playClip(p, 'defense_slide', { loop: true }); return; }
    if (sp > 0.7) { playClip(p, 'run', { loop: true }); return; }
    playClip(p, 'idle', { loop: true });
  }

  /* ---------- 花式与晃倒（GDD §5） ---------- */
  function judgeAnkle (att, def, skillKey) {
    if (!def) return;
    if (def.state === 'fall' || def.state === 'getup' || def.state === 'stumble' || def.airborne || def.state === 'dunk') return;
    var combo = !!(att.lastSkill && att.lastSkill !== skillKey && (gtime - att.lastSkillTime) <= COMBO_WINDOW);
    var rev = false;
    var dsp = speedOf(def);
    if (dsp > 1) {
      var dot = def.vel.x * att.vel.x + def.vel.z * att.vel.z;
      rev = dot < -0.2; /* 防守人正向反方向移动 */
    }
    var dm = (def.idx === 1) ? diffMod().ankleOnAI : diffMod().ankleOnMe;
    var chance = clamp(_calc.ankleChance(skillKey, combo, rev, dm) * (att.mods ? att.mods.fancy : 1), 0, 0.95);
    var level = _calc.ankleLevel(chance, Math.random());
    if (level === 2) makeFall(def, 'fall');
    else if (level === 1) makeStumble(def);
    if (level > 0) {
      emit('ankle', { level: level, victim: def.idx });
      if (att.idx === 0) G.stats.ankles++;
    }
  }
  function makeStumble (p) {
    p.state = 'stumble';

    playClip(p, 'stumble', { loop: false, force: true });

  function makeFall (p, clipName) {
    p.state = 'fall';
    p.stateT = 0;

    p.vel.multiplyScalar(0.2);
    playClip(p, clipName || 'fall', { loop: false, force: true });
    if (p.hasBall && G.ball && G.ball.state === 'held' && G.ball.owner === p.idx) {
      p.hasBall = false;
      G.ball.state = 'loose';
      G.ball.owner = -1;
      G.ball.freeT = 0;
      G.ball.vel.set(rand(-1.5, 1.5), 1.5, rand(-1.5, 1.5));

  function startSkill (p, key) {

    p.switched = false;
    var info = clipInfo(clipName, 0.6);
    p.skillDur = info.dur;
    p.skillSwitchT = (info.ev['switch'] != null) ? info.ev['switch'] : 0.5;
    playClip(p, clipName, { loop: false, force: true });
    if (key === 'stepback') {

    var def = G.players[other(p.idx)];

    p.lastSkillTime = gtime;
  }
  function startFake (p) {
    /* 假投：播 shoot 前 0.25s 后取消 */

    p.stateT = 0;
    p.skillName = 'fake';
    p.skillDur = 0.25;
    p.skillSwitchT = 9;
    p.switched = true;
    playClip(p, 'shoot', { loop: false, force: true });
    /* 诱使 AI 防守人起跳（玩家防守由玩家自己决定） */
    var def = G.players[other(p.idx)];
    if (def && def.idx === 1 && def.state === 'normal' && pdist(p, def) < 1.8) {
      if (Math.random() < diffMod().bait) startBlock(def);
    }
  }
  function updateSkill (p, dt) {
    p.vel.multiplyScalar(Math.exp(-4 * dt));
    p.pos.x += p.vel.x * dt;
    p.pos.z += p.vel.z * dt;
    p.pos.x = clamp(p.pos.x, MINX + 0.1, MAXX - 0.1);
    p.pos.z = clamp(p.pos.z, MINZ + 0.1, MAXZ - 0.1);
    if (p.stateT >= p.skillDur) {
      p.state = 'normal';
      p.stateT = 0;
    }
  }

  /* ---------- v1.1 C1 背打系统 ---------- */
  function enterPost (p) {
    if (!p || p.postUp) return;
    p.postUp = true;
    emit('post:enter', { who: p.idx });
  }
  function exitPost (p) {
    if (!p || !p.postUp) return;
    p.postUp = false;
    emit('post:exit', { who: p.idx });
  }
  /* 背身顶人移动：慢速、面向背对篮筐 */
  function applyPostMovement (p, dt, ct) {
    var mx = clamp(ct.moveX || 0, -1, 1);
    var mz = clamp(ct.moveZ || 0, -1, 1);
    var l = Math.sqrt(mx * mx + mz * mz);
    if (l > 1) { mx /= l; mz /= l; }
    if (G.phase !== 'play') { mx = 0; mz = 0; }
    var max = POST_SPEED;
    if (gtime < p.stumbledUntil) max *= 0.4;
    var k = 1 - Math.exp(-8 * dt);
    p.vel.x += (mx * max - p.vel.x) * k;
    p.vel.z += (mz * max - p.vel.z) * k;
    p.pos.x += p.vel.x * dt;
    p.pos.z += p.vel.z * dt;
    if (G.phase === 'play' &&
        (p.pos.x < MINX || p.pos.x > MAXX || p.pos.z < MINZ || p.pos.z > MAXZ)) {
      outOfBounds(p);
      return;
    }
    var tf = Math.atan2(p.pos.x - G.rimV.x, p.pos.z - G.rimV.z); /* 背对篮筐 */
    if (isFinite(tf)) p.facing = angLerp(p.facing, tf, 1 - Math.exp(-8 * dt));
  }
  /* J = 虚幻转身（dream_shake，晃倒系数 0.40，走通用花式/连招判定） */
  function startDreamShake (p) { startSkill(p, 'dream'); }
  /* K/空格 = 后仰跳投：正常投篮条，绿区 0.85x，对抗干扰减半 */
  function startFadeaway (p) {
    exitPost(p);
    p.state = 'shoot';
    p.stateT = 0;
    p.layup = false;
    p.hook = false;
    p.fadeaway = true;
    p.released = false;
    p.ballGone = false;
    p.clipReleased = false;
    p.meterT = 0;
    var dR = distToRim(p);
    p.shotIsThree = dR > TP_R;
    p.shotType = p.shotIsThree ? 'three' : 'mid';
    p.shotContest = contestOf(p) * 0.5;      /* 干扰减半 */
    p.shotStepback = false;
    var w = _calc.greenWindow(dR, p.shotContest, false, G.shotMode) * 0.85; /* 绿区略窄 */
    p.greenLo = GREEN_CENTER - w / 2;
    p.greenHi = GREEN_CENTER + w / 2;
    p.vel.multiplyScalar(0.2);
    var name = (BB.CLIPS && BB.CLIPS.fadeaway) ? 'fadeaway' : 'shoot';
    var info = clipInfo(name, 1.15);
    p.shootDur = info.dur;
    p.shootRelT = (info.ev.release != null) ? info.ev.release : 0.55;
    playClip(p, name, { loop: false, force: true, onEvent: shootEventHandler(p) });
  }
  /* L = 勾手：距筐 <4m，无条，命中率 hookChance */
  function startHook (p) {
    exitPost(p);
    p.state = 'shoot';
    p.stateT = 0;
    p.layup = false;
    p.fadeaway = false;
    p.hook = true;
    p.released = true;    /* 无表条 */
    p.ballGone = false;
    p.clipReleased = false;
    p.meterT = 0;
    p.relPct = GREEN_CENTER;
    p.shotIsThree = false;
    p.shotType = 'mid';
    p.shotContest = contestOf(p);
    p.shotStepback = false;
    var _dw = (DUNK_GREEN_HI - DUNK_GREEN_LO) / 2 * (p.mods ? p.mods.dunkW : 1); /* v1.4 B2 */
    p.greenLo = GREEN_CENTER - _dw; p.greenHi = Math.min(0.995, GREEN_CENTER + _dw);
    p.vel.multiplyScalar(0.3);
    var name = (BB.CLIPS && BB.CLIPS.hook_shot) ? 'hook_shot' : 'shoot';
    var info = clipInfo(name, 0.95);
    p.shootDur = info.dur;
    p.shootRelT = (info.ev.release != null) ? info.ev.release : 0.5;
    playClip(p, name, { loop: false, force: true, onEvent: shootEventHandler(p) });
  }
  /* U = 背转身突破：退出背打 + 1.2s 速度爆发；防守人刚吃晃则大概率过掉 */
  function startPostSpin (p) {
    exitPost(p);
    p.state = 'skill';
    p.stateT = 0;
    p.skillName = 'postspin';
    p.switched = false;
    var info = clipInfo('post_spin', 0.7);
    p.skillDur = info.dur;
    p.skillSwitchT = (info.ev['switch'] != null) ? info.ev['switch'] : 0.4;
    playClip(p, 'post_spin', { loop: false, force: true });
    p.burstUntil = gtime + 1.2;
    var dx = G.rimV.x - p.pos.x, dz = G.rimV.z - p.pos.z;
    var dl = Math.sqrt(dx * dx + dz * dz) || 1;
    var side = (p.pos.x >= G.rimV.x) ? -1 : 1;
    p.vel.x = dx / dl * 4.5 + side * 1.2;
    p.vel.z = dz / dl * 4.5;
    var def = G.players[other(p.idx)];
    if (def && (def.state === 'stumble' || def.state === 'fall' || gtime < def.stumbledUntil)) {
      if (Math.random() < 0.85) def.stumbledUntil = Math.max(def.stumbledUntil, gtime + 1.0);
    }
    p.lastSkill = 'spin';
    p.lastSkillTime = gtime;
  }

  /* ---------- 防守：抢断 / 封盖 / 干扰 ---------- */
  function contestOf (shooter) {
    var d = G.players[other(shooter.idx)];
    if (!d) return 0;
    var dist = pdist(shooter, d);
    if (dist > 2.2) return 0;
    var c = 1 - dist / 2.2;
    if (d.state === 'block') c += 0.4;
    else if (d.airborne) c += 0.2;
    return clamp(c, 0, 1);
  }
  function trySteal (p) {
    if (p.stealCd > 0 || p.state !== 'normal') return;
    var b = G.ball;
    var h = (b && b.state === 'held' && b.owner >= 0) ? G.players[b.owner] : null;
    if (!h || h.idx === p.idx) return;
    if (h.state === 'dunk' || h.state === 'shoot') return; /* 扣篮/出手中不可抢断 */
    p.state = 'steal';
    p.stateT = 0;
    p.stealCd = 0.9;
    p.stealDur = 0.7;  /* v1.1 C4：失败硬直加长到 0.7s */
    p.vel.multiplyScalar(0.3);
    playClip(p, 'steal_reach', { loop: false, force: true });
    if (pdist(p, h) < STEAL_RANGE && gtime >= (h.stealProtUntil || 0)) {
      var low = b.pos.y < 0.55; /* 球在低位相位 */
      var chance = ((p.idx === 1) ? diffMod().stealAI : 0.40) * (p.mods ? p.mods.steal : 1);
      if (low && Math.random() < chance) {
        /* v1.1 C4 抢断成功：球弹向抢断者身侧后方 1m 内，垂直速度 ≤1.2 */
        h.hasBall = false;
        exitPost(h);
        b.state = 'loose';
        b.owner = -1;
        b.freeT = 0;
        b.shot = null;
        b.pos.set(p.pos.x + Math.sin(p.facing) * 0.35,
          Math.min(Math.max(b.pos.y, 0.45), 0.9),
          p.pos.z + Math.cos(p.facing) * 0.35); /* 球被捅到抢断者手边 */
        var ang = p.facing + Math.PI + rand(-0.7, 0.7);
        var tx = clamp(p.pos.x + Math.sin(ang) * rand(0.35, 0.95), MINX + 0.3, MAXX - 0.3);
        var tz = clamp(p.pos.z + Math.cos(ang) * rand(0.35, 0.95), MINZ + 0.3, MAXZ - 0.3);
        b.vel.set((tx - b.pos.x) / 0.5, Math.min(1.2, rand(0.4, 1.1)), (tz - b.pos.z) / 0.5);
        var hs = Math.sqrt(b.vel.x * b.vel.x + b.vel.z * b.vel.z);
        if (hs > 2.6) { b.vel.x *= 2.6 / hs; b.vel.z *= 2.6 / hs; }
        p.stealDur = 0.15;                    /* 成功硬直缩为 0.15s */
        h.stumbledUntil = gtime + 0.6;        /* 原持球人 0.6s 失衡减速 */
        emit('steal', { who: p.idx });
      }
      /* 失败 = steal 状态持续 0.7s 硬直 */
    }
  }
  function startBlock (p) {
    if (p.state !== 'normal') return;
    var foe = G.players[other(p.idx)];
    /* v1.2 C2 追帽的「正在冲刺」按起跳瞬间（vel 衰减前）评估 */
    var wasSprinting = !!(p.ctrl && p.ctrl.sprint) && speedOf(p) > 2.0;
    p.state = 'block';
    p.stateT = 0;
    p.blockT = gtime;
    p.airborne = true;
    p.vel.multiplyScalar(0.4);
    var info = clipInfo('block_jump', 0.8);
    p.blockDur = info.dur;
    playClip(p, 'block_jump', { loop: false, force: true });
    /* v1.2 C2 追帽：对方 layup/dunk 飞行段 + 我在其身后 0.4~3.5m 冲刺起跳且预计相遇 */
    if (foe && tryChaseBlock(p, foe, wasSprinting)) return;
    /* 迟到封盖：球刚离手 ±0.22s 且距离近（v1.2 窗口/距离/成功率调高） */
    var b = G.ball;
    if (b && b.state === 'shot' && b.shot && b.shot.t <= BLOCK_WINDOW &&
        foe && pdist(p, foe) < BLOCK_RANGE && b.pos.y < 2.8) {
      if (Math.random() < BLOCK_P * (p.mods ? p.mods.block : 1)) blockShot(p);
    }
  }
  function updateBlock (p, dt) {
    p.vel.multiplyScalar(Math.exp(-3 * dt));
    p.pos.x += p.vel.x * dt;
    p.pos.z += p.vel.z * dt;
    /* v1.1 C4：block 落地即回 normal（放宽），立刻可拾球 */
    if (p.stateT >= Math.min(p.blockDur, 0.55)) {
      p.state = 'normal';
      p.stateT = 0;
      p.airborne = false;
    }
  }
  function blockShot (d) {
    var b = G.ball;
    if (!b || b.state !== 'shot') return;
    var dirx = b.pos.x - d.pos.x, dirz = b.pos.z - d.pos.z;
    var dl = Math.sqrt(dirx * dirx + dirz * dirz) || 1;
    b.shot = null;
    b.state = 'loose';
    b.owner = -1;
    b.freeT = 0;
    b.vel.set(dirx / dl * rand(3, 5), rand(0.5, 2), dirz / dl * rand(3, 5) + rand(1, 2.5));
    if (d.idx === 0) G.stats.blocks++;   /* v1.2 C2 盖帽计数 */
    emit('block', { who: d.idx, chase: false });
  }
  /* ---------- v1.2 C2 追帽（chase-down block） ---------- */
  /* 对方是否处于 layup/dunk 飞行段（可被追帽） */
  function inFlightAttack (v) {
    if (!v) return false;
    if (v.state === 'dunk') return !!v.airborne && !v.dunkSlammed;
    if (v.state === 'shoot') return !!v.layup && !!v.airborne && !v.ballGone;
    return false;
  }
  /* d=防守人（刚起跳盖帽），v=进攻人；wasSprinting=起跳瞬间冲刺中。命中返回 true */
  function tryChaseBlock (d, v, wasSprinting) {
    if (!wasSprinting || !inFlightAttack(v)) return false;
    var b = G.ball;
    if (!b || b.state !== 'held' || b.owner !== v.idx) return false;
    var dd = pdist(d, v);
    if (dd < CHASE_MIN || dd > CHASE_MAX) return false;
    /* 身后：防守人比进攻人离筐更远 */
    if (distToRim(d) <= distToRim(v) + 0.15) return false;
    /* 预计相遇：正朝对方或篮筐方向冲 */
    if (!movingToward(d, v.pos) && !movingToward(d, G.rimV)) return false;
    var prob;
    if (v.idx === 0 && v.state === 'dunk' && v.dunkMeterLock >= 0 &&
        _calc.dunkMeterJudge(v.dunkMeterLock, v.mods ? v.mods.dunkW : 1) === 'perfect') {
      prob = CHASE_PERFECT_P;   /* perfect 定条仅追帽 8% 可破 */
    } else {
      var cm = diffMod().chaseAI;
      prob = ((d.idx === 1 && cm != null) ? cm : CHASE_P) * (d.mods ? d.mods.block : 1);
    }
    if (Math.random() >= prob) return false;
    chaseBlockHit(d, v);
    return true;
  }
  function chaseBlockHit (d, v) {
    var b = G.ball;
    if (!b) return;
    v.hasBall = false;
    exitPost(v);
    b.state = 'loose';
    b.owner = -1;
    b.freeT = 0;
    b.shot = null;
    var hv = handWorld(v, 'R');
    b.pos.set(hv.x, Math.max(hv.y, 1.3), hv.z);
    /* 球被大力拍飞向前场方向（+Z 中线），水平 6~9m/s，压向地板 */
    var ang = rand(-0.4, 0.4);
    var sp = rand(6, 9);
    b.vel.set(Math.sin(ang) * sp, rand(-3.0, -1.2), Math.cos(ang) * sp);
    if (v.state === 'dunk') {
      /* 扣篮被追帽：进入下落段，落地趔趄（复用扣飞落地逻辑） */
      v.dunkSlammed = true;
      v.dunkMissed = true;
      v.dunkFallV = 0;
      if (v.idx === 0 && BB.UI && BB.UI.hideMeter) { try { BB.UI.hideMeter(); } catch (e) {} }
    } else {
      /* 上篮被追帽：立刻趔趄 */
      v.state = 'normal';
      v.stateT = 0;
      v.airborne = false;
      makeStumble(v);
    }
    if (d.idx === 0) G.stats.blocks++;
    if (G.camRestoreT < 0.6) G.camRestoreT = 0.6;
    emit('block', { who: d.idx, chase: true });
  }

  /* ---------- 投篮系统（GDD §4） ---------- */
  function distToRim (p) { return dist2(p.pos.x, p.pos.z, G.rimV.x, G.rimV.z); }
  function movingToward (p, target) {
    var dx = target.x - p.pos.x, dz = target.z - p.pos.z;
    var dot = p.vel.x * dx + p.vel.z * dz;
    return speedOf(p) > 0.8 && dot > 0.3;
  }
  function shootEventHandler (p) {
    return function (ev) {
      if (ev === 'release') p.clipReleased = true;
      else if (ev === 'jump') p.airborne = true;
      else if (ev === 'land') p.airborne = false;
    };

      var fxp, fyp, fzp, kf;
      if (holder) { fxp = holder.pos.x; fyp = 1.0; fzp = holder.pos.z; kf = 4; }
      else if (bb) { fxp = bb.pos.x; fyp = bb.pos.y; fzp = bb.pos.z; kf = 2.2; }
      else { fxp = 0; fyp = 1; fzp = -7; kf = 2.2; }
      cam.position.x = dampAxis(cam.position.x, fxp * 0.35, kf, rawDt);
      cam.position.y = dampAxis(cam.position.y, 5.6, kf, rawDt);
      cam.position.z = dampAxis(cam.position.z, fzp * 0.32 + 7.2, kf, rawDt);
      /* lookAt 目标专用阻尼向量 */
      var lx = (fxp + G.rimV.x) / 2;
      var ly = clamp((fyp + G.rimV.y) / 2, 0.8, 3.2);
      var lz = (fzp + G.rimV.z) / 2;
      if (!_lookCur) _lookCur = new THREE.Vector3(lx, ly, lz);
      var lk = Math.min(kf + 0.8, 5);
      _lookCur.x = dampAxis(_lookCur.x, lx, lk, rawDt);
      _lookCur.y = dampAxis(_lookCur.y, ly, lk, rawDt);
      _lookCur.z = dampAxis(_lookCur.z, lz, lk, rawDt);
      cam.lookAt(_lookCur);
    }
    /* 镜头震动 */
    if (BB.FX && BB.FX.camShake && BB.FX.camShake.isVector3) cam.position.add(BB.FX.camShake);
  }

  /* ---------- gameApi（给 UI） ---------- */
  var api = {
    start: function (opts) {
      opts = opts || {};
      G.difficulty = DIFF_MOD[opts.difficulty] ? opts.difficulty : 'pro';
      G.target = (opts.target === 21) ? 21 : (opts.target || 11);
      G.training = (opts.mode === 'train');   /* v1.2 C3 mode:'match'|'train'（默认 match） */
      G.trainT = 0;
      /* v1.4 B1 投篃判定模式：默认标准（2K 风吃干扰），'casual' = v1.3 娱乐手感 */
      G.shotMode = (opts.shotMode === 'casual') ? 'casual' : 'standard';
      /* v1.4 B2 选球员：opts.roster = {me:id, ai:id|'random'} */
      var ro = opts.roster || {};
      var cardMe = rosterById(ro.me || 'ace');
      var cardAI = (ro.ai === 'random' || !ro.ai)
        ? ROSTER[Math.floor(Math.random() * ROSTER.length)]
        : rosterById(ro.ai);
      try { applyRoster(0, cardMe); applyRoster(1, cardAI); } catch (eR) { console.error('[game] roster', eR); }
      G.brain = null;
      try { if (BB.AI && BB.AI.create) G.brain = BB.AI.create(G.difficulty); } catch (e) { console.error('[game] AI.create', e); }
      G.score = [0, 0];
      G.stats = { dunks: 0, ankles: 0, threes: 0, blocks: 0 };
      G.hotStreak = [0, 0];
      G.hot = [false, false];
      G.winner = -1;
      G.mustClear = false;
      G.deadT = 0;
      G.camMode = 'broadcast';
      G.camRestoreT = -1;
      if (BB.time) BB.time.scale = 1;
      pending = {};
      G.phase = 'menu'; /* 解除 over 状态，允许 startCheck 重置（修复：结算后重开卡死） */
      emit('game:start', {});
      startCheck(0); /* 玩家先攻 */
    },
    restart: function () { api.start({ difficulty: G.difficulty, target: G.target, mode: G.training ? 'train' : 'match' }); },
    pause: function () {
      if (G.phase === 'play' || G.phase === 'check') {
        G.prevPhase = G.phase;
        G.phase = 'pause';
      }
    },
    resume: function () {
      if (G.phase === 'pause') G.phase = G.prevPhase || 'play';
    },
    getState: function () {
      return {
        score: [G.score[0], G.score[1]],
        shotClock: G.training ? Infinity : Math.max(0, G.shotClock), /* v1.2 C3 训练无 14 秒 */
        phase: G.phase,
        training: !!G.training,
        shotMode: G.shotMode,
        players: [
          { name: (G.players[0] && G.players[0].card) ? G.players[0].card.name : '我' },
          { name: (G.players[1] && G.players[1].card) ? G.players[1].card.name : 'AI' }
        ],
        stats: {
          dunks: G.stats.dunks, ankles: G.stats.ankles,
          threes: G.stats.threes, blocks: G.stats.blocks || 0
        }
      };
    }
  };
  function togglePause () {
    if (G.phase === 'pause') api.resume();
    else if (G.phase === 'play' || G.phase === 'check') api.pause();
  }

  /* ---------- 主循环 ---------- */
  function animUpdate (dt) {
    for (var i = 0; i < 2; i++) {
      var p = G.players[i];
      if (p && p.anim && p.anim.update) { try { p.anim.update(dt); } catch (e) {} }
    }
  }
  function courtUpdate (dt) {
    if (G.court && G.court.update) { try { G.court.update(dt); } catch (e) {} }
  }
  function fxUiUpdate (rawDt) {
    if (BB.FX && BB.FX.update) { try { BB.FX.update(rawDt); } catch (e) {} }
    if (BB.UI && BB.UI.update) { try { BB.UI.update(rawDt); } catch (e) {} }
  }
  function logic (dt) {
    if (G.deadT > 0) {
      G.deadT -= dt;
      if (G.deadT <= 0) startCheck(G.deadNext);
    }
    if (G.phase === 'check') {
      G.checkT -= dt;
      if (G.checkT <= 0) G.phase = 'play';
    }
    /* v1.2 C3 训练模式：AI 拿到球（抢断/篮板）持球 1s 后球权归还玩家 */
    if (G.training && G.phase === 'play' && G.ball &&
        G.ball.state === 'held' && G.ball.owner === 1) {
      G.trainT += dt;
      if (G.trainT >= 1.0) {
        G.trainT = 0;
        emit('ui:banner', { main: '球权回收', sub: 'TRAINING', style: 'small' });
        startCheck(0);
      }
    } else {
      G.trainT = 0;
    }
    var i;
    for (i = 0; i < 2; i++) updatePlayer(G.players[i], dt);
    resolveCollision();
    updateBall(dt);
    rules(dt);
    for (i = 0; i < 2; i++) {
      selectAnim(G.players[i]);
      syncPlayer(G.players[i]);
    }
  }
  function frame (rawDt, dt) {
    var ph = G.phase;
    if (ph === 'pause') {
      fxUiUpdate(rawDt);
      updateCamera(rawDt);
      return;
    }
    gtime += dt;
    if (ph === 'menu' || ph === 'over') {
      pending = {};
      if (ph === 'over') {
        for (var j = 0; j < 2; j++) syncPlayer(G.players[j]);
        updateBall(dt);
      }
      animUpdate(dt);
      courtUpdate(dt);
      fxUiUpdate(rawDt);
      updateCamera(rawDt);
      return;
    }
    /* 顺序：输入 → 逻辑 → 双方 anim.update → court.update → FX.update(raw) → UI.update(raw) → render */
    if (G.players[0]) readHumanCtrl(G.players[0]);
    if (G.players[1]) readAICtrl(G.players[1], dt);
    logic(dt);
    animUpdate(dt);
    courtUpdate(dt);
    fxUiUpdate(rawDt);
    updateCamera(rawDt);
  }
  function tick () {
    window.requestAnimationFrame(tick);
    var now = nowSec();
    var rawDt = Math.min(0.05, Math.max(0, now - lastT));
    lastT = now;
    var scale = (BB.time && typeof BB.time.scale === 'number') ? BB.time.scale : 1;
    var dt = rawDt * scale;
    try { frame(rawDt, dt); } catch (e) { console.error('[game] frame', e); }
    try { if (G.renderer) G.renderer.render(G.scene, G.camera); } catch (e2) {}
  }

  /* ---------- 启动 ---------- */
  function boot () {
    if (booted) return;
    if (typeof document === 'undefined' || typeof window.requestAnimationFrame !== 'function') {
      console.warn('[game] 无 DOM 环境，跳过 boot（仅逻辑可用）');
      return;
    }
    if (typeof THREE === 'undefined') {
      console.error('[game] THREE 未加载');
      return;
    }
    booted = true;
    /* renderer */
    var renderer;
    try {
      renderer = new THREE.WebGLRenderer({ antialias: true });
    } catch (e) {
      console.error('[game] WebGL 初始化失败', e);
      return;
    }
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    if (renderer.shadowMap) {
      renderer.shadowMap.enabled = true;
      if (typeof THREE.PCFSoftShadowMap !== 'undefined') renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    }
    document.body.appendChild(renderer.domElement);
    G.renderer = renderer;
    G.scene = new THREE.Scene();
    G.camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 300);
    G.camera.position.set(0, 5.6, 7.2);
    G.camera.lookAt(new THREE.Vector3(0, 1.5, -7));
    G.rimV = new THREE.Vector3(RIM.x, RIM.y, RIM.z);
    /* 场地 */
    try { if (BB.buildCourt) G.court = BB.buildCourt(G.scene); } catch (e) { console.error('[game] buildCourt', e); }
    if (!G.court) {
      /* 兜底：素地面 + 灯光，保证可见 */
      try {
        var gnd = new THREE.Mesh(
          new THREE.PlaneGeometry(40, 40),
          new THREE.MeshLambertMaterial({ color: 0x3a6ea5 })
        );
        gnd.rotation.x = -Math.PI / 2;
        gnd.position.z = -7;
        gnd.receiveShadow = true;
        G.scene.add(gnd);
        G.scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        var sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(6, 12, 6);
        sun.castShadow = true;
        G.scene.add(sun);
      } catch (e) {}
    }
    /* 角色：玩家白蓝 #1，AI 黑红 #0 */
    var p0 = makePlayer(0, { jersey: 0xf4f6ff, shorts: 0x1d4fd7, skin: 0xd9a066, shoes: 0xffffff, number: '1', hair: 0x20242a });
    var p1 = makePlayer(1, { jersey: 0x15151a, shorts: 0xc82626, skin: 0x8d5524, shoes: 0x111111, number: '0', hair: 0x0c0c0c });
    G.players = [p0, p1];
    p0.pos.set(-1.2, 0, -5.5); p0.facing = Math.PI;
    p1.pos.set(1.2, 0, -9.5); p1.facing = 0;
    G.scene.add(p0.ch.group);
    G.scene.add(p1.ch.group);
    playClip(p0, 'idle', { loop: true });
    playClip(p1, 'idle', { loop: true });
    syncPlayer(p0);
    syncPlayer(p1);
    /* 球 */
    G.ball = makeBall();
    if (G.ball.mesh) G.scene.add(G.ball.mesh);
    G.ball.pos.set(0, BALL_R, -6);
    /* FX / UI / Sound（判空防御 + 注入引用） */
    if (BB.FX) {
      try { if (BB.FX.init) BB.FX.init(G.scene, G.camera, G.renderer); } catch (e) { console.error('[game] FX.init', e); }
      try { BB.FX.ballRef = G.ball.mesh; } catch (e) {}
    }
    if (BB.UI) {
      try { if (BB.UI.init) BB.UI.init(api); } catch (e) { console.error('[game] UI.init', e); }
      try { BB.UI._camera = G.camera; } catch (e) {}
    }
    /* 输入（首次 keydown/click 时 Sound.init） */
    window.addEventListener('keydown', onKeyDown);
    window.addEventListener('keyup', onKeyUp);
    document.addEventListener('click', soundInitOnce);
    document.addEventListener('pointerdown', soundInitOnce);
    /* 全窗口自适应 */
    window.addEventListener('resize', function () {
      if (!G.camera || !G.renderer) return;
      G.camera.aspect = window.innerWidth / window.innerHeight;
      G.camera.updateProjectionMatrix();
      G.renderer.setSize(window.innerWidth, window.innerHeight);
    });
    lastT = nowSec();
    window.requestAnimationFrame(tick);
  }

  /* ---------- 导出 ---------- */
  BB.Game = {
    boot: boot,
    _calc: _calc,   /* 纯数值函数，供测试 */
    _api: api,      /* 调试用 */
    _state: G       /* 调试用 */
  };
})();

</script>
<script>
try { BB.Game.boot(); } catch (e) {
  var d = document.getElementById('bb-err'); if (d) d.textContent = 'BOOT ERROR: ' + (e.stack || e.message);
  console.error(e);
}
</script>
