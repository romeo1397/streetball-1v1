/* base.js —— 全局命名空间/常量/事件总线/工具  (主策划&架构) */
(function () {
  var BB = window.BB = window.BB || {};

  BB.C = {
    COURT_MINX: -7.5, COURT_MAXX: 7.5, COURT_MINZ: -14, COURT_MAXZ: 0,
    RIM: { x: 0, y: 3.05, z: -12.425 },
    RIM_R: 0.225,
    BOARD_Z: -12.8, BOARD_W: 1.8, BOARD_H: 1.05, BOARD_Y0: 2.9,
    TP_R: 6.75,            // 三分线半径（圈心投影为圆心）
    FT_Z: -8.2, KEY_W: 4.9,
    BALL_R: 0.12,
    PLAYER_H: 1.95, PLAYER_R: 0.35,
    GRAV: 9.8
  };

  /* 事件总线 */
  var _ev = {};
  BB.events = {
    on: function (n, fn) { (_ev[n] = _ev[n] || []).push(fn); return fn; },
    off: function (n, fn) {
      var a = _ev[n]; if (!a) return;
      var i = a.indexOf(fn); if (i >= 0) a.splice(i, 1);
    },
    emit: function (n, d) {
      var a = _ev[n]; if (!a) return;
      for (var i = 0; i < a.length; i++) { try { a[i](d); } catch (e) { console.error('[BB.events]', n, e); } }
    }
  };

  /* 全局时间缩放（慢动作） */
  BB.time = { scale: 1 };

  /* 工具 */
  BB.util = {
    clamp: function (v, a, b) { return v < a ? a : (v > b ? b : v); },
    lerp: function (a, b, t) { return a + (b - a) * t; },
    damp: function (cur, tgt, k, dt) { return cur + (tgt - cur) * (1 - Math.exp(-k * dt)); },
    rand: function (a, b) { return a + Math.random() * (b - a); },
    randi: function (a, b) { return Math.floor(a + Math.random() * (b - a + 1)); },
    choose: function (arr) { return arr[Math.floor(Math.random() * arr.length)]; },
    angLerp: function (a, b, t) {
      var d = b - a;
      while (d > Math.PI) d -= Math.PI * 2;
      while (d < -Math.PI) d += Math.PI * 2;
      return a + d * t;
    },
    v3: function (x, y, z) { return new THREE.Vector3(x || 0, y || 0, z || 0); },
    dist2d: function (ax, az, bx, bz) { var dx = ax - bx, dz = az - bz; return Math.sqrt(dx * dx + dz * dz); }
  };
})();

<script>
/* court.js —— 场景建模师：半场街球场 + 篮架篮网 + 环境
   契约：BB.buildCourt(scene) -> { rimPos, shakeRim(power), update(dt) }
   全部程序化生成（canvas 纹理均 try/catch 守卫，失败降级纯色）。
   材质：MeshLambertMaterial 为主（天空/太阳/灯面用 Basic，网用 LineBasicMaterial）。
   面数估算 < 6k 三角形，远低于 5 万预算。 */
(function () {
  'use strict';
  var BB = window.BB;
  var C = BB.C, U = BB.util;

  /* ================= 通用小工具 ================= */
  var _mats = {};
  function lam(color) {                          // 共享 Lambert 材质缓存
    if (!_mats[color]) _mats[color] = new THREE.MeshLambertMaterial({ color: color });
    return _mats[color];
  }
  function box(parent, w, h, d, mat, x, y, z, shadow) {
    var m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    m.position.set(x, y, z);
    m.castShadow = !!shadow;
    parent.add(m);
    return m;
  }
  function cyl(parent, rt, rb, h, seg, mat, x, y, z, shadow) {
    var m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, seg), mat);
    m.position.set(x, y, z);
    m.castShadow = !!shadow;
    parent.add(m);
    return m;
  }
  function makeTex(w, h, draw) {                 // canvas 纹理生成（失败返回 null 降级）
    if (typeof document === 'undefined') return null;
    try {
      var cv = document.createElement('canvas');
      cv.width = w; cv.height = h;
      var ctx = cv.getContext('2d');
      if (!ctx) return null;
      draw(ctx, w, h);
      return new THREE.CanvasTexture(cv);
    } catch (e) { return null; }
  }

  /* ================= 纹理绘制 ================= */

  /* 球场漆面：蓝底 + 三分内浅蓝 + 红油漆区 + 白线（全部用世界坐标映射的折线画，避免比例失真） */
  function courtTexture() {
    return makeTex(1024, 1024, function (ctx, W, H) {
      function X(x) { return (x + 7.5) / 15 * W; }        // 世界x -> 像素
      function Z(z) { return (z + 14) / 14 * H; }         // 世界z -> 像素（画布顶=底线z=-14）
      function poly(pts, close) {
        ctx.beginPath();
        for (var i = 0; i < pts.length; i++) {
          if (i === 0) ctx.moveTo(X(pts[i][0]), Z(pts[i][1]));
          else ctx.lineTo(X(pts[i][0]), Z(pts[i][1]));
        }
        if (close) ctx.closePath();
      }
      function circle(cx, cz, r, a0, a1, n) {             // 角度a：0 朝 +z
        var pts = [];
        for (var i = 0; i <= n; i++) {
          var a = a0 + (a1 - a0) * i / n;
          pts.push([cx + Math.sin(a) * r, cz + Math.cos(a) * r]);
        }
        return pts;
      }
      var R = C.TP_R, cz = C.RIM.z;                       // 6.75, -12.425
      var phiM = Math.asin(6.6 / R);                      // 三分弧与直线段接点
      var zJoin = cz + R * Math.cos(phiM);
      var arc3 = circle(0, cz, R, -phiM, phiM, 48);
      var tpPath = [[-6.6, -14], [-6.6, zJoin]].concat(arc3).concat([[6.6, zJoin], [6.6, -14]]);

      /* 底色：三分外深蓝 */
      ctx.fillStyle = '#2c5f9f'; ctx.fillRect(0, 0, W, H);
      /* 三分内浅蓝 */
      poly(tpPath, true); ctx.fillStyle = '#3d7dcd'; ctx.fill();
      /* 油漆区红 */
      ctx.fillStyle = '#d64b38';
      ctx.fillRect(X(-C.KEY_W / 2), Z(-14), X(C.KEY_W / 2) - X(-C.KEY_W / 2), Z(C.FT_Z) - Z(-14));
      /* 中圈半圆红 */
      poly(circle(0, 0, 1.8, Math.PI / 2, Math.PI * 1.5, 32), true); ctx.fill();

      /* 白色场线 */
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 6; ctx.lineCap = 'round';
      poly([[-7.44, -13.94], [7.44, -13.94], [7.44, -0.06], [-7.44, -0.06]], true); ctx.stroke(); // 边线
      poly(tpPath); ctx.stroke();                                                                  // 三分线
      poly([[-C.KEY_W / 2, -14], [-C.KEY_W / 2, C.FT_Z], [C.KEY_W / 2, C.FT_Z], [C.KEY_W / 2, -14]]); ctx.stroke(); // 油漆区
      poly(circle(0, C.FT_Z, 1.8, 0, Math.PI * 2, 40)); ctx.stroke();                              // 罚球圈
      poly(circle(0, cz, 1.25, -Math.PI / 2, Math.PI / 2, 24)); ctx.stroke();                      // 合理冲撞区
      poly(circle(0, 0, 1.8, Math.PI / 2, Math.PI * 1.5, 32)); ctx.stroke();                       // 中圈半圆
    });
  }

  /* 沥青：深灰 + 噪点 + 裂缝 */
  function asphaltTexture() {
    var tex = makeTex(256, 256, function (ctx, W, H) {
      ctx.fillStyle = '#45474c'; ctx.fillRect(0, 0, W, H);
      var cols = ['#4d5056', '#3c3e43', '#54575e', '#404349'];
      for (var i = 0; i < 420; i++) {
        ctx.fillStyle = cols[i % 4];
        ctx.fillRect(Math.random() * W, Math.random() * H, 2, 2);
      }
      ctx.strokeStyle = '#393b3f'; ctx.lineWidth = 1.5;
      for (var k = 0; k < 4; k++) {
        ctx.beginPath();
        var x = Math.random() * W, y = Math.random() * H * 0.5;
        ctx.moveTo(x, y);
        for (var j = 0; j < 5; j++) { x += U.rand(-30, 30); y += U.rand(10, 40); ctx.lineTo(x, y); }
        ctx.stroke();
      }
    });
    if (tex) { tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(9, 8); }
    return tex;
  }

  /* 天空：竖向渐变（顶蓝 -> 地平线暖白） */
  function skyTexture() {
    return makeTex(32, 256, function (ctx, W, H) {
      var g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0.0, '#3e8ede');
      g.addColorStop(0.45, '#7dbdee');
      g.addColorStop(0.72, '#cfeaf8');
      g.addColorStop(1.0, '#f6e7c4');
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    });
  }

  /* 铁丝网：透明底 + 交叉斜线（平铺成菱形网格） */
  function fenceTexture() {
    var tex = makeTex(64, 64, function (ctx, W, H) {
      ctx.strokeStyle = 'rgba(215,225,232,0.95)'; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(W, H); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(W, 0); ctx.lineTo(0, H); ctx.stroke();
    });
    if (tex) { tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(66, 9); }
    return tex;
  }

  /* 涂鸦墙：水泥底 + 喷漆斑 + 斜体大字「街球」「1v1」+ 波浪线 */
  function graffitiTexture() {
    return makeTex(512, 256, function (ctx, W, H) {
      ctx.fillStyle = '#c3beb0'; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#b1ab9c';                                    // 砖缝
      ctx.fillRect(0, 0, W, 12); ctx.fillRect(0, 120, W, 8); ctx.fillRect(0, 238, W, 10);
      var spots = [[70, 195, 34, 'rgba(64,200,255,0.55)'], [420, 55, 40, 'rgba(255,220,60,0.5)'],
                   [470, 200, 26, 'rgba(120,255,120,0.5)'], [40, 55, 24, 'rgba(255,110,190,0.55)']];
      for (var i = 0; i < spots.length; i++) {                      // 喷漆圆斑
        ctx.fillStyle = spots[i][3];
        ctx.beginPath(); ctx.arc(spots[i][0], spots[i][1], spots[i][2], 0, Math.PI * 2);
        ctx.closePath(); ctx.fill();
      }
      ctx.font = 'bold 96px sans-serif';                            // 大字带阴影（双重fillText）
      ctx.setTransform(1, -0.06, -0.28, 1, 100, 150);
      ctx.fillStyle = '#26282e'; ctx.fillText('街球', 6, 6);
      ctx.fillStyle = '#ff5a36'; ctx.fillText('街球', 0, 0);
      ctx.setTransform(1, 0.08, -0.22, 1, 330, 175);
      ctx.font = 'bold 110px sans-serif';
      ctx.fillStyle = '#26282e'; ctx.fillText('1v1', 6, 6);
      ctx.fillStyle = '#ffd23c'; ctx.fillText('1v1', 0, 0);
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.strokeStyle = '#3ad0c0'; ctx.lineWidth = 9; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(40, 214);                         // 波浪下划线
      for (var x = 66; x <= 300; x += 26) ctx.lineTo(x, 214 + ((x / 26) % 2 ? -9 : 9));
      ctx.stroke();
    });
  }

  /* ================= 主入口 ================= */
  BB.buildCourt = function (scene) {
    var root = new THREE.Group();
    root.name = 'court';
    scene.add(root);
    var i;

    /* ---------- 灯光 ---------- */
    root.add(new THREE.HemisphereLight(0xcfe8ff, 0x8f8577, 0.65));
    var sun = new THREE.DirectionalLight(0xfff0d5, 1.1);
    sun.position.set(14, 22, 9);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.left = -19; sun.shadow.camera.right = 19;
    sun.shadow.camera.top = 19; sun.shadow.camera.bottom = -19;
    sun.shadow.camera.near = 2; sun.shadow.camera.far = 70;
    sun.shadow.bias = -0.0004;
    sun.target.position.set(0, 0, -7);
    root.add(sun); root.add(sun.target);

    /* ---------- 天空 + 太阳 ---------- */
    var sTex = skyTexture();
    var sky = new THREE.Mesh(
      new THREE.SphereGeometry(180, 20, 12),
      new THREE.MeshBasicMaterial(sTex ? { map: sTex, side: THREE.BackSide }
                                       : { color: 0x87c4ee, side: THREE.BackSide }));
    root.add(sky);
    var sunBall = new THREE.Mesh(new THREE.SphereGeometry(5, 10, 8),
      new THREE.MeshBasicMaterial({ color: 0xfff6cf }));
    sunBall.position.set(71, 111, 45);                    // 与平行光同方向
    root.add(sunBall);

    /* ---------- 地面 ---------- */
    var farG = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), lam(0x565b53));  // 远景地表
    farG.rotation.x = -Math.PI / 2; farG.position.set(0, -0.05, -20);
    root.add(farG);

    var aTex = asphaltTexture();                                                   // 场外沥青
    var asphalt = new THREE.Mesh(new THREE.PlaneGeometry(70, 62),
      aTex ? new THREE.MeshLambertMaterial({ map: aTex }) : lam(0x45474c));
    asphalt.rotation.x = -Math.PI / 2; asphalt.position.set(0, 0, -8);
    asphalt.receiveShadow = true;
    root.add(asphalt);

    var cTex = courtTexture();                                                     // 彩色漆面
    if (cTex) cTex.anisotropy = 8;
    var court = new THREE.Mesh(new THREE.PlaneGeometry(15, 14),
      cTex ? new THREE.MeshLambertMaterial({ map: cTex }) : lam(0x3d7dcd));
    court.rotation.x = -Math.PI / 2; court.position.set(0, 0.012, -7);
    court.receiveShadow = true;
    root.add(court);

    /* ---------- 篮架静止部分：配重底座 + 立柱 + 软垫 + 伸臂 ---------- */
    var hoop = new THREE.Group(); root.add(hoop);
    box(hoop, 0.7, 0.35, 0.9, lam(0x33383e), 0, 0.175, -15.15, true);
    cyl(hoop, 0.09, 0.11, 3.9, 10, lam(0x3f4750), 0, 1.95, -15.1, true);
    cyl(hoop, 0.16, 0.18, 1.7, 10, lam(0x2f5fb0), 0, 0.85, -15.1, false);
    var arm = box(hoop, 0.13, 0.13, 2.35, lam(0x3f4750), 0, 3.72, -13.99, true);
    arm.rotation.x = 0.145;                                // 向篮板方向略下倾

    /* ---------- 可晃动组件（枢轴 = 圈心 BB.C.RIM）：篮板 + 篮筐 + 网 ---------- */
    var asm = new THREE.Group();
    asm.position.set(C.RIM.x, C.RIM.y, C.RIM.z);
    hoop.add(asm);

    var board = new THREE.Mesh(                            // 半透明篮板（面 z=-12.8）
      new THREE.BoxGeometry(C.BOARD_W, C.BOARD_H, 0.04),
      new THREE.MeshLambertMaterial({ color: 0xdff2fb, transparent: true, opacity: 0.4,
                                      side: THREE.DoubleSide, depthWrite: false }));
    board.position.set(0, C.BOARD_Y0 + C.BOARD_H / 2 - C.RIM.y, C.BOARD_Z - C.RIM.z - 0.02);
    asm.add(board);

    var frameM = lam(0xf4f6f8);
    var fz = C.BOARD_Z - C.RIM.z + 0.012;                  // 板前沿贴条
    box(asm, 1.84, 0.06, 0.024, frameM, 0, 0.90, fz, false);          // 外框
    box(asm, 1.84, 0.06, 0.024, frameM, 0, -0.15, fz, false);
    box(asm, 0.06, 1.16, 0.024, frameM, -0.90, 0.375, fz, false);
    box(asm, 0.06, 1.16, 0.024, frameM, 0.90, 0.375, fz, false);
    box(asm, 0.63, 0.045, 0.024, frameM, 0, 0.0, fz, false);          // 白色小方框
    box(asm, 0.63, 0.045, 0.024, frameM, 0, 0.45, fz, false);
    box(asm, 0.045, 0.48, 0.024, frameM, -0.295, 0.225, fz, false);
    box(asm, 0.045, 0.48, 0.024, frameM, 0.295, 0.225, fz, false);

    var rimMat = lam(0xff7420);                            // 橙色篮筐
    var rim = new THREE.Mesh(new THREE.TorusGeometry(C.RIM_R, 0.021, 10, 26), rimMat);
    rim.rotation.x = Math.PI / 2;
    rim.castShadow = true;
    asm.add(rim);
    box(asm, 0.14, 0.08, 0.17, rimMat, 0, -0.045, -0.30, false);      // 筐-板连接件

    /* 篮网：12 条 Line，上宽下窄，奇偶股反向折角交错成菱形网眼 */
    var strands = [];
    var netMat = new THREE.LineBasicMaterial({ color: 0xf2f5f7 });
    var NSTR = 12, SEG = 4, NET_L = 0.44, R0 = 0.215, R1 = 0.105;
    for (i = 0; i < NSTR; i++) {
      var a0 = i / NSTR * Math.PI * 2;
      var sgn = (i % 2 === 0) ? 1 : -1;
      var base = [], arr = new Float32Array((SEG + 1) * 3);
      for (var j = 0; j <= SEG; j++) {
        var tt = j / SEG;
        var an = a0 + ((j % 2 === 1) ? sgn * (Math.PI / NSTR) : 0);
        var r = U.lerp(R0, R1, tt);
        var bx = Math.cos(an) * r, by = -NET_L * tt, bz = Math.sin(an) * r;
        base.push([bx, by, bz]);
        arr[j * 3] = bx; arr[j * 3 + 1] = by; arr[j * 3 + 2] = bz;
      }
      var g = new THREE.BufferGeometry();
      g.setAttribute('position', new THREE.BufferAttribute(arr, 3));
      var line = new THREE.Line(g, netMat);
      asm.add(line);
      strands.push({ arr: arr, attr: g.getAttribute('position'), base: base, ph: a0 * 2.3 });
    }

    /* ---------- 围栏（三面铁丝网，+z 侧留入口只放柱和横杆） ---------- */
    var FEX = 11, FZ0 = -17, FZ1 = 3, FH = 3;
    var fTex = fenceTexture();
    var fenceMat = fTex
      ? new THREE.MeshLambertMaterial({ map: fTex, transparent: true, alphaTest: 0.3, side: THREE.DoubleSide })
      : new THREE.MeshLambertMaterial({ color: 0xb9c4cc, transparent: true, opacity: 0.18,
                                        side: THREE.DoubleSide, depthWrite: false });
    function fencePanel(w, x, z, rotY) {
      var p = new THREE.Mesh(new THREE.PlaneGeometry(w, FH), fenceMat);
      p.position.set(x, FH / 2, z); p.rotation.y = rotY;
      root.add(p);
    }
    fencePanel(FEX * 2, 0, FZ0, 0);
    fencePanel(FZ1 - FZ0, -FEX, (FZ0 + FZ1) / 2, Math.PI / 2);
    fencePanel(FZ1 - FZ0, FEX, (FZ0 + FZ1) / 2, Math.PI / 2);
    var postM = lam(0x6f7a80), railM = lam(0x9aa4ab);
    var postGeo = new THREE.CylinderGeometry(0.035, 0.035, FH, 6);
    function post(x, z) {
      var m = new THREE.Mesh(postGeo, postM);
      m.position.set(x, FH / 2, z); m.castShadow = true;
      root.add(m);
    }
    for (i = 0; i <= 8; i++) { post(-FEX + i * FEX / 4, FZ0); post(-FEX + i * FEX / 4, FZ1); }
    for (i = 1; i <= 6; i++) { post(-FEX, FZ0 + i * (FZ1 - FZ0) / 7); post(FEX, FZ0 + i * (FZ1 - FZ0) / 7); }
    box(root, FEX * 2 + 0.1, 0.05, 0.05, railM, 0, FH - 0.02, FZ0, false);   // 顶部横杆
    box(root, FEX * 2 + 0.1, 0.05, 0.05, railM, 0, FH - 0.02, FZ1, false);
    box(root, 0.05, 0.05, FZ1 - FZ0 + 0.1, railM, -FEX, FH - 0.02, (FZ0 + FZ1) / 2, false);
    box(root, 0.05, 0.05, FZ1 - FZ0 + 0.1, railM, FEX, FH - 0.02, (FZ0 + FZ1) / 2, false);

    /* ---------- 涂鸦墙（-x 侧场边，面朝球场） ---------- */
    box(root, 0.25, 2.5, 10, lam(0xbcb7a8), -10.45, 1.25, -7, true);
    var gTex = graffitiTexture();
    if (gTex) {
      var gp = new THREE.Mesh(new THREE.PlaneGeometry(9.7, 2.3),
        new THREE.MeshLambertMaterial({ map: gTex }));
      gp.rotation.y = Math.PI / 2;
      gp.position.set(-10.31, 1.3, -7);
      root.add(gp);
    }

    /* ---------- 场边长椅 ×2（+x 侧） ---------- */
    function bench(x, z) {
      box(root, 0.45, 0.07, 1.9, lam(0xb5722f), x, 0.44, z, true);
      box(root, 0.4, 0.42, 0.08, lam(0x3c3f44), x, 0.21, z - 0.78, true);
      box(root, 0.4, 0.42, 0.08, lam(0x3c3f44), x, 0.21, z + 0.78, true);
    }
    bench(8.8, -3.6);
    bench(8.8, -9.8);

    /* ---------- 灯杆 ×2（底线两角，仅装饰） ---------- */
    function flood(x, z, ry) {
      var g = new THREE.Group(); g.position.set(x, 0, z); g.rotation.y = ry;
      cyl(g, 0.055, 0.075, 5.2, 8, lam(0x4a5158), 0, 2.6, 0, true);
      var head = box(g, 0.55, 0.28, 0.3, lam(0x39404a), 0, 5.25, 0.25, false);
      head.rotation.x = 0.6;
      var face = box(g, 0.45, 0.18, 0.02, new THREE.MeshBasicMaterial({ color: 0xfff9d8 }),
                     0, 5.19, 0.41, false);
      face.rotation.x = 0.6;
      root.add(g);
    }
    flood(-10.2, -16.2, 0.84);
    flood(10.2, -16.2, -0.84);

    /* ---------- 远景低 poly 楼房剪影 ---------- */
    var blds = [
      [-19, -30, 9, 8, 15, 0x6d7f93], [-7, -35, 11, 9, 22, 0x7b6f92],
      [5, -32, 8, 8, 12, 0x5f8a8c], [16, -29, 9, 9, 18, 0x8a7d6b],
      [27, -20, 8, 10, 10, 0x70808a], [-27, -16, 9, 9, 13, 0x77698a],
      [-25, -1, 8, 8, 9, 0x628296], [25, -4, 8, 8, 14, 0x8a6f70]
    ];
    for (i = 0; i < blds.length; i++) {
      var b = blds[i];
      box(root, b[2], b[4], b[3], lam(b[5]), b[0], b[4] / 2, b[1], false);
      if (i % 2 === 0)                                          // 屋顶小机房
        box(root, b[2] * 0.3, 1.2, b[3] * 0.3, lam(0x55606a), b[0] + b[2] * 0.2, b[4] + 0.6, b[1], false);
    }

    /* ================= 晃动与更新 ================= */
    var t = 0, shakeP = 0, shakeT = 99;

    function shakeRim(power) {
      var p = U.clamp(power == null ? 0.6 : power, 0, 1);
      shakeP = Math.min(1.2, shakeP * Math.exp(-3.2 * shakeT) + 0.25 + p * 0.85);
      shakeT = 0;
    }

    function update(dt) {
      dt = dt || 0;
      t += dt; shakeT += dt;
      /* 篮筐+篮板整体震颤（阻尼正弦） */
      var s = shakeP * Math.exp(-3.2 * shakeT);
      asm.rotation.x = Math.sin(shakeT * 30) * 0.10 * s;
      asm.rotation.z = Math.sin(shakeT * 23 + 1.2) * 0.05 * s;
      asm.position.y = C.RIM.y - 0.055 * s * Math.abs(Math.sin(shakeT * 28));
      /* 篮网摆动：微风常驻 + 受击放大后慢阻尼 */
      var na = Math.min(0.16, 0.006 + 0.30 * shakeP * Math.exp(-2.2 * shakeT));
      for (var k = 0; k < strands.length; k++) {
        var st = strands[k], arr2 = st.arr, bs = st.base;
        for (var j2 = 1; j2 < bs.length; j2++) {
          var f = j2 / (bs.length - 1);                     // 越往下摆幅越大
          arr2[j2 * 3]     = bs[j2][0] + Math.sin(t * 7.3 + st.ph + f * 2.1) * na * f;
          arr2[j2 * 3 + 2] = bs[j2][2] + Math.cos(t * 6.1 + st.ph * 1.31 + f * 1.7) * na * f * 0.85;
        }
        st.attr.needsUpdate = true;
      }
    }

    return {
      rimPos: new THREE.Vector3(C.RIM.x, C.RIM.y, C.RIM.z),
      shakeRim: shakeRim,
      update: update
    };
  };
})();

<script>
/* character.js —— 低poly卡通球员建模 v1.1（角色建模师）
 * BB.createCharacter(opts) -> ch
 * 骨架关节位置严格按 ARCHITECTURE.md 契约（16 关节一毫米不动）。rotation order 'XYZ'。
 * rest 姿势：直立、手臂自然下垂、所有关节 rotation=(0,0,0)。
 * v1.1 建模细化：锥形四肢 / 胸腹两段收腰躯干 / 球衣侧条纹领口 / 短裤条纹裤边 /
 *   球鞋三件套(鞋身/鞋底/鞋带) / 手掌+手指 / 五官(眼眉鼻嘴) / 发型3款随机 / 护腕护臂。
 * v1.4 建模优化（16 关节坐标/名称/API 零改动）：
 *   头部：颧骨双球塑形+太阳穴收型；肤色深浅两档随机（opts.skin 可覆盖）；
 *   发型新增 2 款：3脏辫排 / 4光头+胡茬色块（共5款随机，opts.hairStyle 兼容旧 0~2）；
 *   躯干：斜方肌颈坡、胸肌轮廓微凸、袖笼撞色滚边、下摆前后开衩双片；
 *   四肢：肘/膝关节球缩小消台阶、左前臂静脉细条、手指分两节（近节+末节微屈）；
 *   球鞋：鞋头上翘 0.24rad、气垫层白条外露、鞋舌凸出。
 * 所有 canvas 纹理 try/catch + typeof document 守卫，node 环境降级纯色。全 mesh castShadow。
 */
(function () {
  var BB = window.BB = window.BB || {};

  var REST_PELVIS_Y = 1.05;
  /* v1.4：肤色两档（浅/深），未显式指定 opts.skin 时随机取一档 */
  var SKIN_TONES = [0xd99a6c, 0x8a5638];

  function colHex(c) { return '#' + ('000000' + (c >>> 0).toString(16)).slice(-6); }
  /* 颜色乘法调暗（静脉/胡茬等衍生色） */
  function shade(c, f) {
    var r = Math.min(255, Math.round(((c >> 16) & 255) * f));
    var g = Math.min(255, Math.round(((c >> 8) & 255) * f));
    var b = Math.min(255, Math.round((c & 255) * f));
    return (r << 16) | (g << 8) | b;
  }

  /* ---------- 号码 canvas 纹理（node 环境/失败时降级纯色） ---------- */
  function makeNumberTexture(num) {
    try {
      if (typeof document === 'undefined') return null;
      var c = document.createElement('canvas');
      c.width = 128; c.height = 128;
      var g = c.getContext('2d');
      if (!g) return null;
      g.clearRect(0, 0, 128, 128);
      g.font = 'bold 86px Arial, sans-serif';
      g.textAlign = 'center';
      g.textBaseline = 'middle';
      g.lineWidth = 12;
      g.lineJoin = 'round';
      g.strokeStyle = 'rgba(20,20,30,0.9)';
      g.strokeText(String(num), 64, 70);
      g.fillStyle = '#ffffff';
      g.fillText(String(num), 64, 70);
      var tex = new THREE.CanvasTexture(c);
      tex.needsUpdate = true;
      return tex;
    } catch (e) {
      return null;
    }
  }

  /* ---------- 球衣纹理：底色 + 两侧竖条纹 + 领口/下摆包边 ---------- */
  function makeJerseyTexture(base, accent) {
    try {
      if (typeof document === 'undefined') return null;
      var c = document.createElement('canvas');
      c.width = 64; c.height = 64;
      var g = c.getContext('2d');
      if (!g) return null;
      g.fillStyle = colHex(base); g.fillRect(0, 0, 64, 64);
      /* 侧条纹（圆柱 UV：u=0.25/0.75 恰为左右侧面） */
      g.fillStyle = colHex(accent);
      g.fillRect(12, 0, 8, 64);
      g.fillRect(44, 0, 8, 64);
      g.fillStyle = '#f5f5f5';
      g.fillRect(15, 0, 2, 64);
      g.fillRect(47, 0, 2, 64);
      /* 领口（顶）与下摆（底）包边 */
      g.fillStyle = colHex(accent);
      g.fillRect(0, 0, 64, 4);
      g.fillRect(0, 60, 64, 4);
      var tex = new THREE.CanvasTexture(c);
      tex.needsUpdate = true;
      return tex;
    } catch (e) {
      return null;
    }
  }

  /* ---------- 短裤纹理：底色 + 侧条纹 + 裤边条纹 ---------- */
  function makeShortsTexture(base, accent) {
    try {
      if (typeof document === 'undefined') return null;
      var c = document.createElement('canvas');
      c.width = 64; c.height = 64;
      var g = c.getContext('2d');
      if (!g) return null;
      g.fillStyle = colHex(base); g.fillRect(0, 0, 64, 64);
      g.fillStyle = colHex(accent);
      g.fillRect(13, 0, 6, 64);
      g.fillRect(45, 0, 6, 64);
      /* 裤边（底部）双色条纹 */
      g.fillRect(0, 54, 64, 6);
      g.fillStyle = '#f5f5f5';
      g.fillRect(0, 60, 64, 4);
      var tex = new THREE.CanvasTexture(c);
      tex.needsUpdate = true;
      return tex;
    } catch (e) {
      return null;
    }
  }

  BB.createCharacter = function (opts) {
    opts = opts || {};
    var COL = {
      jersey: opts.jersey !== undefined ? opts.jersey : 0x2196f3,
      shorts: opts.shorts !== undefined ? opts.shorts : 0x1a237e,
      skin:   opts.skin   !== undefined ? opts.skin   : SKIN_TONES[Math.floor(Math.random() * SKIN_TONES.length)],
      shoes:  opts.shoes  !== undefined ? opts.shoes  : 0xf2f2f2,
      hair:   opts.hair   !== undefined ? opts.hair   : 0x1b1b1b
    };
    var number = opts.number !== undefined ? String(opts.number) : '23';
    /* v1.4 发型 5 款随机（opts.hairStyle 固定：0平头 1爆炸头 2莫西干 3脏辫排 4光头+胡茬，旧 0~2 语义不变） */
    var hairStyle = opts.hairStyle !== undefined ? (opts.hairStyle % 5 + 5) % 5 : Math.floor(Math.random() * 5);

    /* 球衣配色互为撞色 */
    var jerseyTex = makeJerseyTexture(COL.jersey, COL.shorts);
    var shortsTex = makeShortsTexture(COL.shorts, COL.jersey);

    var matJersey = jerseyTex
      ? new THREE.MeshLambertMaterial({ map: jerseyTex })
      : new THREE.MeshLambertMaterial({ color: COL.jersey });
    var matJerseyPlain = new THREE.MeshLambertMaterial({ color: COL.jersey });
    var matShorts = shortsTex
      ? new THREE.MeshLambertMaterial({ map: shortsTex })
      : new THREE.MeshLambertMaterial({ color: COL.shorts });
    var matShortsPlain = new THREE.MeshLambertMaterial({ color: COL.shorts });
    var matSkin   = new THREE.MeshLambertMaterial({ color: COL.skin });
    var matShoes  = new THREE.MeshLambertMaterial({ color: COL.shoes });
    var matHair   = new THREE.MeshLambertMaterial({ color: COL.hair });
    var matSole   = new THREE.MeshLambertMaterial({ color: 0xffffff });
    var matSock   = new THREE.MeshLambertMaterial({ color: 0xffffff });
    var matDark   = new THREE.MeshLambertMaterial({ color: 0x18181f });
    var matWhite  = new THREE.MeshLambertMaterial({ color: 0xfafafa });
    var matAccent = new THREE.MeshLambertMaterial({ color: COL.jersey });
    /* v1.4 新材质 */
    var matVein    = new THREE.MeshLambertMaterial({ color: shade(COL.skin, 0.82) });          /* 前臂静脉细条 */
    var matStubble = new THREE.MeshLambertMaterial({ color: shade(COL.skin, 0.52) });          /* 光头款胡茬色块 */
    var matAir     = new THREE.MeshLambertMaterial({ color: 0xeef4ff });                       /* 气垫层白条 */
    var matHem     = jerseyTex
      ? new THREE.MeshLambertMaterial({ map: jerseyTex, side: THREE.DoubleSide })
      : new THREE.MeshLambertMaterial({ color: COL.jersey, side: THREE.DoubleSide });          /* 下摆开衩片(双面) */

    var group = new THREE.Group();

    function joint(parent, x, y, z, name) {
      var o = new THREE.Object3D();
      o.position.set(x, y, z);
      o.rotation.order = 'XYZ';
      o.name = name;
      parent.add(o);
      return o;
    }
    function mesh(parent, geo, mat, x, y, z) {
      var m = new THREE.Mesh(geo, mat);
      m.position.set(x || 0, y || 0, z || 0);
      parent.add(m);
      return m;
    }
    function cyl(parent, rTop, rBot, len, mat, x, y, z, seg) {
      return mesh(parent, new THREE.CylinderGeometry(rTop, rBot, len, seg || 8), mat, x, y, z);
    }

    function buildLeg(hip, knee, ankle) {

    buildLeg(hipR, kneeR, ankleR);

    (function () {
      var tex = makeNumberTexture(number);

      applyPose: function (pose) {
        pose = pose || {};
        for (var n in bones) {
          var b = bones[n], r = pose[n];

      }
    };

  };

<script>
/* animations.js —— 街球动作包 + AnimCtrl（动作包设计师）
 * BB.CLIPS: 名称 -> {duration, loop, smooth, events:{名称:归一化时刻}, keys:[{t, pose}]}
 * pose: {骨骼名:[rx,ry,rz], __root:[dx,dy,dz]}，缺省骨骼=rest。
 * 旋转约定：手臂/腿 rx 负=向前摆(+Z)；躯干/头 rx 正=前倾；rz=外展。
 * BB.AnimCtrl: play/update/crossfade（从当前实际姿势快照混入新 clip）。
 * v1.3：新增花扣四式 dunk_legs/dunk_elbow/dunk_ft/dunk_720；
 *   运球包优化（重心压低/锁拍/护球手/换手提速/收尾起速），名称/loop/events 名不变。
 * v1.4 A1 运球去僵硬（名称/loop/events 名不变，时长 ±20% 内）：
 *   - 运动循环全部 ≥6 关键帧（8~9 帧），消除直线插值感；
 *   - 骨盆 ry ±0.06~0.11 左右摆 + 肩部(chest ry)反相位配重；
 *   - 头部滞后半拍跟随（head ry 相位比骨盆晚 1/4 周期）；
 *   - 拍球瞬间手腕下压 snap（bounce 前一帧后勾蓄劲 → bounce 帧猛压 → 后一帧回弹）；
 *   - 触地帧脚踝 rx 缓冲下沉（plant 后一帧重心最低+踝背屈）；
 *   - 护球手小圆弧摆动，不走直线；
 *   - 花式六招：起手蓄势更深、爆发段帧距压缩(0.03~0.07s)、收尾惯性过冲(overshoot)再回正。
 */
(function () {
  var BB = window.BB = window.BB || {};

  var BONES = ['pelvis', 'spine', 'chest', 'head',
    'shoulderL', 'elbowL', 'wristL', 'shoulderR', 'elbowR', 'wristR',
    'hipL', 'kneeL', 'ankleL', 'hipR', 'kneeR', 'ankleR'];
  var CHANNELS = BONES.concat(['__root']);
  var ZERO3 = [0, 0, 0];

  /* 合并若干 pose 片段（后者覆盖前者），值做拷贝 */

    src.buffer = noiseBuf; src.loop = true;
    var fl = ctx.createBiquadFilter();
    fl.type = type || 'lowpass';
    fl.frequency.setValueAtTime(freq || 1000, t0);
    if (freqTo) fl.frequency.exponentialRampToValueAtTime(Math.max(freqTo, 1), t0 + dur);
    fl.Q.value = q || 0.8;
    src.connect(fl);
    fl.connect(env(t0, 0.006, peak, dur));
    src.start(t0); src.stop(t0 + dur + 0.06);
  }
  /* 人群底噪：带通噪声 + 慢包络 + LFO 幅度起伏 */
  function crowd(t0, dur, peak, bright) {
    var src = ctx.createBufferSource();
    src.buffer = noiseBuf; src.loop = true;
    var hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 260;
    var lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = bright ? 3200 : 1300;
    var g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.linearRampToValueAtTime(peak, t0 + dur * 0.22);
    g.gain.setValueAtTime(peak, t0 + dur * 0.55);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    var lfo = ctx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 5 + Math.random() * 3;
    var lg = ctx.createGain(); lg.gain.value = peak * 0.3;
    lfo.connect(lg); lg.connect(g.gain);
    src.connect(hp); hp.connect(lp); lp.connect(g); g.connect(master);
    src.start(t0); src.stop(t0 + dur + 0.1);
    lfo.start(t0); lfo.stop(t0 + dur + 0.1);
  }
  /* 口哨滑音（crowd_wild 用） */
  function whistle(t0, peak) {
    var o = ctx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(1500, t0);
    o.frequency.exponentialRampToValueAtTime(2750, t0 + 0.18);
    o.frequency.exponentialRampToValueAtTime(2050, t0 + 0.5);
    var vib = ctx.createOscillator(); vib.type = 'sine'; vib.frequency.value = 22;
    var vg = ctx.createGain(); vg.gain.value = 55;
    vib.connect(vg); vg.connect(o.frequency);
    o.connect(env(t0, 0.03, peak, 0.55));
    o.start(t0); o.stop(t0 + 0.65);
    vib.start(t0); vib.stop(t0 + 0.65);
  }
  function at(o) { return ctx.currentTime + ((o && o.delay) || 0); }
  function vol(o) { return (o && typeof o.vol === 'number') ? o.vol : 1; }

  /* ---------- 音色表 ---------- */
  var SND = {
    /* 运球弹地：低频短促下滑 + 噪声瞬态，音量随 speed */
    bounce: function (o) {
      var v = Math.min(Math.max(((o.speed || 6) / 12), 0.25), 1) * vol(o);
      var t = at(o);
      var osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(130, t);
      osc.frequency.exponentialRampToValueAtTime(52, t + 0.1);
      osc.connect(env(t, 0.002, 0.5 * v, 0.12));
      osc.start(t); osc.stop(t + 0.18);
      noise(t, 0.03, 0.16 * v, 'lowpass', 850);
    },
    /* 空心刷网：白噪声高通嗖 */
    swish: function (o) {
      var t = at(o), v = vol(o);
      noise(t, 0.28, 0.3 * v, 'highpass', 2200, 0.7, 4200);
      noise(t + 0.02, 0.2, 0.12 * v, 'bandpass', 6000, 1.5);
    },
    /* 打铁：金属叮当（三个不谐和分音 + 撞击瞬态） */
    rim: function (o) {
      var t = at(o), v = vol(o);
      tone('triangle', 812, t, 0.3, 0.2 * v);
      tone('triangle', 1618, t, 0.22, 0.13 * v);
      tone('sine', 2412, t, 0.14, 0.07 * v);
      noise(t, 0.02, 0.16 * v, 'bandpass', 3000, 2);
    },
    /* 打板闷响 */
    board: function (o) {
      var t = at(o), v = vol(o);
      tone('sine', 145, t, 0.14, 0.32 * v, 70);
      noise(t, 0.06, 0.14 * v, 'lowpass', 520);
    },
    /* 球鞋急停吱声 */
    squeak: function (o) {
      var t = at(o), v = vol(o);
      var osc = ctx.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(1250 + Math.random() * 500, t);
      osc.frequency.exponentialRampToValueAtTime(2600, t + 0.06);
      osc.frequency.exponentialRampToValueAtTime(1650, t + 0.13);
      var fl = ctx.createBiquadFilter();
      fl.type = 'bandpass'; fl.frequency.value = 2200; fl.Q.value = 4;
      osc.connect(fl);
      fl.connect(env(t, 0.01, 0.1 * v, 0.13));
      osc.start(t); osc.stop(t + 0.2);
    },
    /* 破风 */
    whoosh: function (o) {
      var t = at(o), v = vol(o);
      noise(t, 0.16, 0.22 * v, 'bandpass', 420, 1.2, 2300);
      noise(t + 0.12, 0.2, 0.18 * v, 'bandpass', 2300, 1.2, 550);
    },
    /* 人群惊呼「喔——」 */
    crowd_ooh: function (o) {
      var t = at(o), v = vol(o);
      crowd(t, 0.9, 0.3 * v, false);
      noise(t + 0.04, 0.7, 0.1 * v, 'bandpass', 480, 3);   /* 元音共振 */
    },
    /* 人群欢呼 */
    crowd_cheer: function (o) {
      var t = at(o), v = vol(o);
      crowd(t, 1.8, 0.35 * v, true);
    },
    /* 爆炸欢呼 + 口哨滑音 + 零星尖叫 */
    crowd_wild: function (o) {
      var t = at(o), v = vol(o);
      crowd(t, 2.4, 0.48 * v, true);
      whistle(t + 0.15, 0.09 * v);
      whistle(t + 0.55, 0.07 * v);
      for (var i = 0; i < 4; i++) {
        noise(t + 0.1 + Math.random() * 0.9, 0.05, 0.1 * v, 'highpass', 3000);
      }
    },
    /* 终场蜂鸣器 1.2s */
    buzzer: function (o) {
      var t = at(o), v = vol(o), dur = 1.2;
      var g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(0.26 * v, t + 0.02);
      g.gain.setValueAtTime(0.26 * v, t + dur - 0.06);
      g.gain.linearRampToValueAtTime(0.0001, t + dur);
      var lp = ctx.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 1600;
      lp.connect(g); g.connect(master);
      var freqs = [311, 314];              /* 双方波微差拍频，够刺耳但不炸 */
      for (var i = 0; i < freqs.length; i++) {
        var osc = ctx.createOscillator();
        osc.type = 'square';
        osc.frequency.value = freqs[i];
        osc.connect(lp);
        osc.start(t); osc.stop(t + dur + 0.05);
      }
    },
    /* 界面点击 */
    click: function (o) {
      var t = at(o), v = vol(o);
      tone('square', 950, t, 0.04, 0.12 * v, 600);
      noise(t, 0.015, 0.06 * v, 'highpass', 4000);
    },
    /* 得分上扬双音 */
    score: function (o) {
      var t = at(o), v = vol(o);
      tone('triangle', 587, t, 0.14, 0.2 * v);
      tone('triangle', 880, t + 0.09, 0.24, 0.22 * v);
    }
  };

  /* ---------- 对外 API ---------- */
  BB.Sound = {
    /* 懒建 AudioContext + resume；须在用户手势回调里调用 */
    init: function () {
      ensureCtx();
      if (ctx && ctx.state === 'suspended') {
        try { ctx.resume(); } catch (e) {}
      }
    },
    /* 未 init（或环境无 WebAudio）时静默返回 */
    play: function (name, opts) {
      if (!ctx || !noiseBuf) return;
      var fn = SND[name];
      if (!fn) return;
      var now = ctx.currentTime;
      var gap = GAP[name] || 0;
      if (gap && lastAt[name] !== undefined && now - lastAt[name] < gap) return;
      lastAt[name] = now;
      try { fn(opts || {}); } catch (e) { /* 音频异常不影响游戏 */ }
    }
  };

  /* ---------- 事件总线自动配音 ---------- */
  if (BB.events && BB.events.on) {
    var P = function (n, o) { BB.Sound.play(n, o); };
    BB.events.on('bounce', function (d) { P('bounce', { speed: d && d.speed }); });
    BB.events.on('rim:hit', function () { P('rim'); });
    BB.events.on('swish', function () { P('swish'); });
    BB.events.on('score', function (d) {
      P('score');
      if (d && (d.points === 3 || d.type === 'dunk')) P('crowd_cheer', { vol: 0.6 });
    });
    BB.events.on('ankle', function (d) {
      P('crowd_ooh');
      if (d && d.level === 2) { P('whoosh'); P('squeak', { vol: 0.8 }); }
    });
    BB.events.on('dunk:slam', function (d) {
      P('crowd_wild', { vol: d && d.poster ? 1 : 0.75 });
      P('board', { vol: 1.1 });
      P('rim', { vol: 0.9 });
    });
    /* v1.1：扣飞 = rim 重击 + 人群惊呼 */
    BB.events.on('dunk:miss', function () {
      P('rim', { vol: 1.3 });
      P('board', { vol: 0.8 });
      P('crowd_ooh', { vol: 0.95 });
    });
    /* v1.2 C2：'block' 负载 {who, chase}——追帽 = crowd_wild + whoosh */
    BB.events.on('block', function (d) {
      if (d && d.chase) {
        P('crowd_wild', { vol: 0.9 });
        P('whoosh', { vol: 1.1 });
      } else {
        P('whoosh');
        P('crowd_ooh', { vol: 0.7 });
      }
    });
    BB.events.on('steal', function () { P('squeak'); P('whoosh', { vol: 0.7 }); });
    BB.events.on('game:end', function () { P('buzzer'); P('crowd_cheer', { delay: 0.7, vol: 0.9 }); });
    BB.events.on('checkball', function () { P('click', { vol: 0.7 }); });
  }
})();

</script>
<script>
/* fx.js —— 视觉演出特效（特效/UI/音效程序员）
 * BB.FX = { init(scene,camera,renderer), update(rawDt), camShake:THREE.Vector3, setHot(who,on), ballRef:null }
 * - 慢动作：直接改 BB.time.scale，包络由 update(rawDt)（未缩放 dt）驱动，结束保证回 1
 * - camShake：随机抖动指数衰减，game.js 每帧把它加到相机位置上
 * - 粒子：扣篮火花/冲击环、晃倒扬尘、终场彩纸雨、热手球火焰拖尾（对象池，零运行时分配）
 * - 隔扣：全屏 DOM 闪白 0.1s + CSS 径向速度线
 */
(function () {
  var root = (typeof window !== 'undefined') ? window :
             (typeof globalThis !== 'undefined') ? globalThis : this;
  var BB = root.BB = root.BB || {};
  var HAS_DOC = typeof document !== 'undefined';
  var HAS_THREE = typeof THREE !== 'undefined';
  var U = BB.util || {
    rand: function (a, b) { return a + Math.random() * (b - a); }
  };

  var FX = BB.FX = {
    camShake: HAS_THREE ? new THREE.Vector3() : { x: 0, y: 0, z: 0, set: function () {} },
    ballRef: null,          /* game.js 注入球 mesh，热手拖尾用（判空） */
    init: init,
    update: update,
    setHot: setHot
  };

  var scene = null, camera = null, renderer = null, inited = false;
  var hot = [false, false];
  var shakeAmp = 0;
  /* 慢动作状态机：0 空闲 / 1 保持 / 2 恢复 */
  var slow = { phase: 0, holdT: 0, recT: 0, recDur: 0.5, from: 1 };
  var sparks = null, dust = null, trail = null;
  var rings = [];
  var confGroup = null, confItems = [];
  var trailT = 0;

  /* ---------- 通用点粒子池 ---------- */
  function PointPool(n, mat, gravity, drag) {
    this.n = n;
    this.gravity = gravity;
    this.drag = drag || 0;
    this.pos = new Float32Array(n * 3);
    this.vel = new Float32Array(n * 3);
    this.life = new Float32Array(n);
    for (var i = 0; i < n; i++) this.pos[i * 3 + 1] = -999;   /* 藏到地下 */
    this.geo = new THREE.BufferGeometry();
    this.geo.setAttribute('position', new THREE.BufferAttribute(this.pos, 3));
    this.obj = new THREE.Points(this.geo, mat);
    this.obj.frustumCulled = false;
    this.cursor = 0;
  }
  PointPool.prototype.spawn = function (x, y, z, vx, vy, vz, life) {
    if (!isFinite(x) || !isFinite(y) || !isFinite(z)) return;
    var i = this.cursor;
    this.cursor = (i + 1) % this.n;
    var p = i * 3;
    this.pos[p] = x; this.pos[p + 1] = y; this.pos[p + 2] = z;
    this.vel[p] = vx; this.vel[p + 1] = vy; this.vel[p + 2] = vz;
    this.life[i] = life;
  };
  PointPool.prototype.update = function (dt) {
    var dirty = false;
    for (var i = 0; i < this.n; i++) {
      if (this.life[i] <= 0) continue;
      dirty = true;
      this.life[i] -= dt;
      var p = i * 3;
      if (this.life[i] <= 0) { this.pos[p + 1] = -999; continue; }
      var dr = this.drag ? Math.exp(-this.drag * dt) : 1;
      this.vel[p] *= dr;
      this.vel[p + 2] *= dr;
      this.vel[p + 1] += this.gravity * dt;
      this.pos[p] += this.vel[p] * dt;
      this.pos[p + 1] += this.vel[p + 1] * dt;
      this.pos[p + 2] += this.vel[p + 2] * dt;
      /* 落地火花小弹跳 */
      if (this.gravity < 0 && this.pos[p + 1] < 0.02) {
        this.pos[p + 1] = 0.02;
        this.vel[p + 1] *= -0.35;
      }
    }
    if (dirty) this.geo.attributes.position.needsUpdate = true;
  };

  /* ---------- 初始化 ---------- */
  function init(sc, cam, rend) {
    scene = sc || null;
    camera = cam || null;
    renderer = rend || null;
    ensureDom();
    if (inited || !scene || !HAS_THREE) return;
    inited = true;
    sparks = new PointPool(160, new THREE.PointsMaterial({
      color: 0xffa02e, size: 0.1, transparent: true, opacity: 0.95,
      depthWrite: false, blending: THREE.AdditiveBlending
    }), -11, 0.6);
    dust = new PointPool(90, new THREE.PointsMaterial({
      color: 0xcdc3b0, size: 0.18, transparent: true, opacity: 0.55, depthWrite: false
    }), -1.4, 2.6);
    trail = new PointPool(140, new THREE.PointsMaterial({
      color: 0xff5f1f, size: 0.14, transparent: true, opacity: 0.8,
      depthWrite: false, blending: THREE.AdditiveBlending
    }), 0.9, 1.2);
    scene.add(sparks.obj);
    scene.add(dust.obj);
    scene.add(trail.obj);
    /* 冲击环池 */
    for (var i = 0; i < 3; i++) {
      var m = new THREE.Mesh(
        new THREE.RingGeometry(0.42, 0.52, 28),
        new THREE.MeshBasicMaterial({
          color: 0xffcf5e, transparent: true, opacity: 0,
          side: THREE.DoubleSide, depthWrite: false
        }));
      m.visible = false;
      m.rotation.x = -Math.PI / 2;
      rings.push({ mesh: m, t: 0, dur: 0.55, on: false });
      scene.add(m);
    }
    buildConfetti();
  }

  /* ---------- 彩纸雨 ---------- */
  function buildConfetti() {
    confGroup = new THREE.Group();
    confGroup.visible = false;
    var colors = [0xff4757, 0xffa502, 0x2ed573, 0x1e90ff, 0xffd700, 0xff6b81, 0xffffff];
    var geo = new THREE.PlaneGeometry(0.1, 0.06);
    for (var i = 0; i < 90; i++) {
      var mesh = new THREE.Mesh(geo,
        new THREE.MeshBasicMaterial({ color: colors[i % colors.length], side: THREE.DoubleSide }));
      mesh.visible = false;
      confItems.push({ m: mesh, vy: 0, sway: 0, ph: 0, spin: 0, life: 0 });
      confGroup.add(mesh);
    }
    scene.add(confGroup);
  }
  function burstConfetti() {
    if (!confGroup) return;
    confGroup.visible = true;
    for (var i = 0; i < confItems.length; i++) {
      var c = confItems[i];
      c.m.visible = true;
      c.m.position.set(U.rand(-7, 7), U.rand(5, 10), U.rand(-13.5, -1));
      c.m.rotation.set(Math.random() * 3, Math.random() * 3, Math.random() * 3);
      c.vy = U.rand(-2.4, -1.2);
      c.sway = U.rand(1.2, 3.2);
      c.ph = Math.random() * 6.28;
      c.spin = U.rand(2, 7);
      c.life = U.rand(2.5, 5.5);
    }
  }
  function confettiUpdate(dt) {
    if (!confGroup || !confGroup.visible) return;
    var any = false;
    for (var i = 0; i < confItems.length; i++) {
      var c = confItems[i];
      if (!c.m.visible) continue;
      c.life -= dt;
      c.ph += dt * c.sway;
      c.m.position.y += c.vy * dt;
      c.m.position.x += Math.sin(c.ph) * 0.5 * dt;
      c.m.rotation.x += c.spin * dt;
      c.m.rotation.z += c.spin * 0.6 * dt;
      if (c.life <= 0 || c.m.position.y < 0.02) { c.m.visible = false; continue; }
      any = true;
    }
    if (!any) confGroup.visible = false;
  }

  /* ---------- 冲击环 ---------- */
  function spawnRing(x, y, z) {
    for (var i = 0; i < rings.length; i++) {
      if (rings[i].on) continue;
      var r = rings[i];
      r.on = true; r.t = 0;
      r.mesh.visible = true;
      r.mesh.position.set(x, y, z);
      r.mesh.scale.set(1, 1, 1);
      r.mesh.material.opacity = 0.9;
      return;
    }
  }
  function ringsUpdate(dt) {
    for (var i = 0; i < rings.length; i++) {
      var r = rings[i];
      if (!r.on) continue;
      r.t += dt;
      var k = r.t / r.dur;
      if (k >= 1) { r.on = false; r.mesh.visible = false; continue; }
      var s = 1 + k * 6;
      r.mesh.scale.set(s, s, s);
      r.mesh.material.opacity = 0.9 * (1 - k);
    }
  }

  /* ---------- 热手火焰拖尾 ---------- */
  function setHot(who, on) {
    if (who === 0 || who === 1) hot[who] = !!on;
    else hot[0] = hot[1] = !!on;
  }
  function trailUpdate(dt) {
    if (!(hot[0] || hot[1])) return;
    var b = FX.ballRef;
    if (!b || !b.position || !isFinite(b.position.x)) return;   /* 判空防御 */
    trailT -= dt;
    if (trailT > 0) return;
    trailT = 0.016;
    var p = b.position;
    for (var i = 0; i < 2; i++) {
      trail.spawn(
        p.x + U.rand(-0.06, 0.06), p.y + U.rand(-0.06, 0.06), p.z + U.rand(-0.06, 0.06),
        U.rand(-0.25, 0.25), U.rand(0.4, 1.2), U.rand(-0.25, 0.25),
        U.rand(0.18, 0.38));
    }
  }

  /* ---------- 慢动作 / 镜头震动 ---------- */
  function slowmo(scale, hold, rec) {
    if (!(scale > 0 && scale < 1)) return;
    BB.time.scale = scale;
    slow.phase = 1;
    slow.holdT = Math.max(hold, 0.001);
    slow.recDur = Math.max(rec, 0.05);
    slow.recT = 0;
    slow.from = scale;
  }
  function shake(amp) {
    shakeAmp = Math.max(shakeAmp, amp);
  }

  /* ---------- 全屏闪白 + 速度线（隔扣） ---------- */
  var flashEl = null, linesEl = null, domReady = false;
  function ensureDom() {
    if (!HAS_DOC || domReady) return;
    domReady = true;
    var st = document.createElement('style');
    st.id = 'bbfx-style';
    st.textContent =
      '#bbfx-flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:60;}' +
      '#bbfx-flash.on{animation:bbfxF .12s linear forwards;}' +
      '@keyframes bbfxF{0%{opacity:.95;}100%{opacity:0;}}' +
      '#bbfx-lines{position:fixed;inset:0;opacity:0;pointer-events:none;z-index:59;' +
      'background:repeating-conic-gradient(from 0deg at 50% 50%,rgba(255,255,255,.9) 0deg 1.4deg,rgba(255,255,255,0) 1.4deg 8deg);' +
      '-webkit-mask-image:radial-gradient(circle at 50% 50%,transparent 34%,#000 80%);' +
      'mask-image:radial-gradient(circle at 50% 50%,transparent 34%,#000 80%);}' +
      '#bbfx-lines.on{animation:bbfxL .45s ease-out forwards;}' +
      '@keyframes bbfxL{0%{opacity:.85;transform:scale(1);}100%{opacity:0;transform:scale(1.3);}}';
    document.head.appendChild(st);
    flashEl = document.createElement('div'); flashEl.id = 'bbfx-flash';
    linesEl = document.createElement('div'); linesEl.id = 'bbfx-lines';
    document.body.appendChild(flashEl);
    document.body.appendChild(linesEl);
  }
  function posterFlash() {
    ensureDom();
    if (!flashEl) return;
    flashEl.classList.remove('on');
    linesEl.classList.remove('on');
    void flashEl.offsetWidth;          /* 强制 reflow 重启动画 */
    flashEl.classList.add('on');
    linesEl.classList.add('on');
  }

  /* ---------- 每帧更新（game 传入未缩放 rawDt） ---------- */
  function update(rawDt) {
    var dt = (typeof rawDt === 'number' && isFinite(rawDt) && rawDt > 0) ? Math.min(rawDt, 0.1) : 1 / 60;
    /* 慢动作包络 */
    if (slow.phase === 1) {
      slow.holdT -= dt;
      if (slow.holdT <= 0) { slow.phase = 2; slow.recT = 0; }
    } else if (slow.phase === 2) {
      slow.recT += dt;
      var k = Math.min(1, slow.recT / slow.recDur);
      k = k * k * (3 - 2 * k);        /* smoothstep 回弹更顺 */
      BB.time.scale = slow.from + (1 - slow.from) * k;
      if (slow.recT >= slow.recDur) { BB.time.scale = 1; slow.phase = 0; }
    }
    /* 镜头震动：随机方向 + 指数衰减 */
    if (shakeAmp > 0.001) {
      shakeAmp *= Math.exp(-5.5 * dt);
      FX.camShake.set(
        U.rand(-1, 1) * shakeAmp,
        U.rand(-1, 1) * shakeAmp * 0.7,
        U.rand(-1, 1) * shakeAmp * 0.5);
    } else {
      shakeAmp = 0;
      FX.camShake.set(0, 0, 0);
    }
    /* 粒子随游戏时间缩放（慢动作时粒子也慢） */
    var sdt = dt * (BB.time.scale > 0 ? BB.time.scale : 1);
    if (sparks) sparks.update(sdt);
    if (dust) dust.update(sdt);
    if (trail) { trailUpdate(sdt); trail.update(sdt); }
    ringsUpdate(sdt);
    confettiUpdate(sdt);
  }

  /* ---------- 事件演出 ---------- */
  if (BB.events && BB.events.on) {
    BB.events.on('ankle', function (d) {
      d = d || {};
      if (d.level === 2) {
        slowmo(0.5, 0.05, 0.6);        /* 降到 0.5，0.6s 回 1 */
        shake(0.26);                   /* 中等震动 */
        var p = (FX.ballRef && FX.ballRef.position && isFinite(FX.ballRef.position.x))
          ? FX.ballRef.position : { x: 0, y: 0.2, z: -8 };
        if (dust) {
          for (var i = 0; i < 26; i++) {
            dust.spawn(
              p.x + U.rand(-0.4, 0.4), 0.06 + Math.random() * 0.15, p.z + U.rand(-0.4, 0.4),
              U.rand(-1.4, 1.4), U.rand(0.6, 2.2), U.rand(-1.4, 1.4),
              U.rand(0.4, 0.9));
          }
        }
      } else {
        shake(0.11);
      }
    });
    BB.events.on('dunk:slam', function (d) {
      d = d || {};
      shake(d.poster ? 0.55 : 0.35);   /* 强震动 */
      var R = (BB.C && BB.C.RIM) ? BB.C.RIM : { x: 0, y: 3.05, z: -12.4 };
      if (sparks) {
        for (var i = 0; i < 42; i++) {
          var a = Math.random() * Math.PI * 2;
          var sp = U.rand(1.5, 5);
          sparks.spawn(
            R.x + U.rand(-0.15, 0.15), R.y + U.rand(-0.12, 0.08), R.z + U.rand(-0.15, 0.15),
            Math.cos(a) * sp, U.rand(-2.5, 1.8), Math.sin(a) * sp,
            U.rand(0.3, 0.7));
        }
      }
      spawnRing(R.x, R.y - 0.05, R.z);
      if (d.poster) {
        slowmo(0.3, 0.5, 0.4);         /* 0.3 保持 0.5s 后回 1 */
        posterFlash();                 /* 闪白 + 速度线 */
      }
    });
    /* v1.2 C2：普通盖帽轻震动；追帽 = 慢动作 0.5x 保持 0.5s + 中震动 */
    BB.events.on('block', function (d) {
      if (d && d.chase) {
        slowmo(0.5, 0.5, 0.35);
        shake(0.3);
      } else {
        shake(0.1);
      }
    });
    BB.events.on('game:end', function () { burstConfetti(); });
    BB.events.on('hot', function (d) { d = d || {}; setHot(d.who, d.on); });
  }
})();

    optRow(box, '难度', DIFFS, function () { return S.diff; }, function (v) { S.diff = v; });
    optRow(box, '目标分', [[11, '11 分'], [21, '21 分']],
      function () { return S.target; }, function (v) { S.target = v; });
    /* v1.4 B1 投篮判定双模式 */
    optRow(box, '投篮判定', [['standard', '标准(2K式)'], ['casual', '娱乐']],
      function () { return S.shotMode; }, function (v) { S.shotMode = v; });
    /* v1.4 B2 选球员（BB.ROSTER 防御式） */
    if (BB.ROSTER && BB.ROSTER.length) {
      var meItems = [], aiItems = [['random', '随机']];
      BB.ROSTER.forEach(function (c) {
        meItems.push([c.id, c.name]);
        aiItems.push([c.id, c.name]);
      });
      optRow(box, '我的球员', meItems, function () { return S.rosterMe; }, function (v) { S.rosterMe = v; });
      optRow(box, '对手球员', aiItems, function () { return S.rosterAI; }, function (v) { S.rosterAI = v; });
      var tip = mk('div', 'bb-roster-tip', box, '');
      function rosterTip() {
        var c = null;
        BB.ROSTER.forEach(function (x) { if (x.id === S.rosterMe) c = x; });
        if (!c) { tip.textContent = ''; return; }
        var st = c.stats || {};
        tip.textContent = c.name + '·' + c.title + '  速度' + st.spd + ' 三分' + st.three +
          ' 中投' + st.mid + ' 扣篮' + st.dunk + ' 抢断' + st.steal + ' 盖帽' + st.block + ' 花式' + st.fancy;
      }
      rosterTip();
      box.addEventListener('click', rosterTip);
    }
    var row = mk('div', 'bb-row', box);
    var start = mk('div', 'bb-btn big', row, '开 始 比 赛');
    start.onclick = function () {
      sfx('click');
      S.playing = true; S.paused = false; S.mode = 'match';
      hide(m); show(els.hud);
      try { if (api && api.start) api.start({ difficulty: S.diff, target: S.target, mode: 'match', shotMode: S.shotMode, roster: { me: S.rosterMe, ai: S.rosterAI } }); }
      catch (e) { if (typeof console !== 'undefined') console.error('[BB.UI] start', e); }
    };
    /* v1.2 C3 训练模式：无限玩家球权 / 无违例 / 永不结束 */
    var train = mk('div', 'bb-btn', row, '训练模式');
    train.onclick = function () {
      sfx('click');
      S.playing = true; S.paused = false; S.mode = 'train';
      hide(m); show(els.hud);
      try { if (api && api.start) api.start({ difficulty: S.diff, target: S.target, mode: 'train', shotMode: S.shotMode, roster: { me: S.rosterMe, ai: S.rosterAI } }); }
      catch (e) { if (typeof console !== 'undefined') console.error('[BB.UI] train', e); }
    };
    var kbtn = mk('div', 'bb-btn', box, '按键说明');
    var keys = mk('div', '', box, KEYS_HTML);
    keys.id = 'bb-keys';
    keys.style.display = 'none';
    kbtn.onclick = function () {
      sfx('click');
      keys.style.display = (keys.style.display === 'none') ? 'block' : 'none';
    };
  }

  function buildHud() {
    var h = els.hud = mk('div', '', els.root);
    h.id = 'bb-hud';
    var sc = mk('div', '', h);
    sc.id = 'bb-score';
    sc.innerHTML = '<em>我</em> <b>0</b><i>:</i><b>0</b> <em>AI</em>';
    var bs = sc.getElementsByTagName('b');
    els.s0 = bs[0]; els.s1 = bs[1];
    var ems = sc.getElementsByTagName('em');
    els.n0 = ems[0]; els.n1 = ems[1];
    els.clock = mk('div', '', h, '14');
    els.clock.id = 'bb-clock';
    els.post = mk('div', '', h, '背打模式');
    els.post.id = 'bb-post';
    /* v1.2 C3 训练模式角标 */
    els.train = mk('div', '', h, '训练模式');
    els.train.id = 'bb-train';
    var hint = els.hint = mk('div', '', h);
    hint.id = 'bb-hint';
    hint.innerHTML = '<div id="bb-hint-tog">操作提示 ▾</div>' +
      '<div class="bb-hint-body">WASD 移动 · Shift 冲刺<br>' +
      '空格 蓄力投篮 / 冲刺扣篮 / 盖帽<br>' +
      '扣篮按住空格拉条，冲到顶端绿窗松手（金线=完美）<br>' +
      'J 变向 · K 背运 · L 胯下 · U 转身<br>' +
      'I 犹豫步 · O 后撤步 · F 假投<br>' +
      'E 背打：J晃 · K/空格后仰 · L勾手 · U转身<br>' +
      '防守：J 抢断 · 空格/K 盖帽 · P 暂停</div>';
    var tog = hint.firstChild;
    tog.onclick = function () {
      hint.classList.toggle('fold');
      tog.textContent = hint.classList.contains('fold') ? '操作提示 ▸' : '操作提示 ▾';
    };
  }

  function buildMeter() {
    /* v1.2 C1：从顶部向下延伸的填充条（pct 与绿区都按「顶端为 0」坐标系映射） */
    var m = els.meter = mk('div', '', els.root);
    m.id = 'bb-meter';
    els.mzone = mk('div', 'bb-mzone', m);   /* 绿区 */
    els.mfill = mk('div', 'bb-mfill', m);   /* 顶部向下的亮色填充 */
    els.mperf = mk('div', 'bb-mperf', m);   /* perfect 金色细线（绿区中心） */
    els.mptr = mk('div', 'bb-mptr', m);     /* 前沿指针 = 当前值 */
  }

  function buildBanner() {
    els.bnbox = mk('div', '', els.root);
    els.bnbox.id = 'bb-bnbox';
  }

  function buildPops() {
    els.pops = mk('div', '', els.root);
    els.pops.id = 'bb-pops';
  }

  function buildPause() {
    var p = els.pause = mk('div', 'bb-modal', els.root);
    p.id = 'bb-pause';
    mk('div', 'bb-h1', p, '暂停');
    var b1 = mk('div', 'bb-btn big', p, '继续比赛');
    var b2 = mk('div', 'bb-btn', p, '重新开始');
    var b3 = mk('div', 'bb-btn', p, '回主菜单');
    b1.onclick = function () { sfx('click'); setPause(false); };
    b2.onclick = function () {
      sfx('click');
      S.paused = false; S.playing = true;
      hide(p); show(els.hud);
      try { if (api && api.restart) api.restart(); } catch (e) {}
    };
    b3.onclick = function () {
      sfx('click');
      S.paused = false; S.playing = false;
      hide(p); hide(els.hud); hide(els.result);
      show(els.menu, 'flex');
    };
  }

  function buildResult() {
    var r = els.result = mk('div', 'bb-modal', els.root);
    r.id = 'bb-result';
    els.resTitle = mk('div', 'bb-h1', r, '胜利！');
    els.resSub = mk('div', 'bb-sub', r, '');
    els.resStats = mk('div', '', r, '');
    els.resStats.id = 'bb-stats';
    var again = mk('div', 'bb-btn big', r, '再来一局');
    var home = mk('div', 'bb-btn', r, '回主菜单');
    again.onclick = function () {
      sfx('click');
      S.playing = true; S.paused = false;
      hide(r); show(els.hud);
      try { if (api && api.restart) api.restart(); } catch (e) {}
    };
    home.onclick = function () {
      sfx('click');
      hide(r);
      show(els.menu, 'flex');
    };
  }

  /* ---------- 暂停 ---------- */
  function setPause(on) {
    if (!S.playing) return;
    S.paused = !!on;
    if (els.pause) els.pause.style.display = on ? 'flex' : 'none';
    try {
      if (api) {
        if (on && api.pause) api.pause();
        if (!on && api.resume) api.resume();
      }
    } catch (e) {}
  }
  function onKey(e) {
    if (!S.playing) return;
    if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
      if (els.result && els.result.style.display === 'flex') return;
      setPause(!S.paused);
    }
  }

  /* ---------- HUD 刷新 ---------- */
  function refreshHud() {
    if (!api || !api.getState) return;
    var st;
    try { st = api.getState(); } catch (e) { return; }
    if (!st) return;
    var sc = st.score || [0, 0];
    if (els.s0) els.s0.textContent = sc[0] | 0;
    if (els.s1) els.s1.textContent = sc[1] | 0;
    /* v1.4 B2 记分牌显示球员名 */
    if (st.players) {
      if (els.n0 && st.players[0] && st.players[0].name) els.n0.textContent = st.players[0].name;
      if (els.n1 && st.players[1] && st.players[1].name) els.n1.textContent = st.players[1].name;
    }
    /* v1.2 C3 训练模式：秒表显示 ∞ + 左上角标 */
    if (els.train) els.train.style.display = st.training ? 'block' : 'none';
    if (els.clock) {
      var t = st.shotClock;
      if (st.training) {
        els.clock.textContent = '∞';
        els.clock.classList.remove('low');
      } else if (typeof t === 'number' && isFinite(t)) {
        els.clock.textContent = Math.max(0, Math.ceil(t));
        els.clock.classList.toggle('low', t <= 5);   /* 剩 5 秒红闪 */
      } else {
        els.clock.textContent = '';
        els.clock.classList.remove('low');
      }
    }
  }

  /* ---------- 投篮/扣篮条（v1.3 A2：底=0 顶=1，填充从底向上涨；投篮扣篮共用）
   * 绿窗由 game.js 传入新窗口语义 [0.66,0.99]（顶端向下 1/3 区段），此处按 1-x 映射到屏幕。 */
  function showMeter(pct, greenLo, greenHi) {
    S.meterVisible = true;
    if (!els.meter || S.meterFreeze > 0) return;   /* 定格期间不刷新 */
    pct = clamp01(pct); greenLo = clamp01(greenLo); greenHi = clamp01(greenHi);
    els.meter.style.display = 'block';
    /* 绿窗：底=0 顶=1 → 屏幕 top = 1-greenHi（新判定窗 [0.66,0.99] 即渲染在顶端 1/3） */
    els.mzone.style.top = ((1 - greenHi) * 100) + '%';
    els.mzone.style.height = (Math.max(0, greenHi - greenLo) * 100) + '%';
    /* perfect 金线：绿窗中央 */
    if (els.mperf) els.mperf.style.top = 'calc(' + ((1 - (greenLo + greenHi) / 2) * 100) + '% - 1px)';
    /* 填充从底部向上涨，前沿即当前值 */
    if (els.mfill) {
      els.mfill.style.height = (pct * 100) + '%';
      els.mfill.style.background = '';             /* 恢复默认亮色渐变 */
      els.mfill.style.boxShadow = '';
    }
    els.mptr.style.top = 'calc(' + ((1 - pct) * 100) + '% - 3px)';
    els.mptr.style.background = '#fff';
    els.mptr.style.boxShadow = 'none';
  }
  function hideMeter() {
    S.meterVisible = false;
    if (!els.meter || S.meterFreeze > 0) return;   /* 定格结束后自动隐藏 */
    els.meter.style.display = 'none';
  }
  function freezeMeter(quality) {
    if (!els.meter || els.meter.style.display === 'none') return;
    S.meterFreeze = 0.4;                            /* 定格 0.4s 显示品质色（金/绿/黄/红） */
    var c = QCOLOR[quality] || '#fff';
    els.mptr.style.background = c;
    els.mptr.style.boxShadow = '0 0 10px ' + c;
    if (els.mfill) {
      els.mfill.style.background = c;
      els.mfill.style.boxShadow = '0 0 12px ' + c;
    }
  }

  /* ---------- 横幅队列 ---------- */
  function banner(main, sub, style) {
    S.queue.push({ main: main || '', sub: sub || '', style: style || 'norm' });
    if (S.queue.length > 4) S.queue.shift();        /* 演出密集时丢最旧 */
  }
  function stepBanner(dt) {
    /* v1.3 A1：最多 3 条同显，右侧带内纵向排布（flex column）不重叠 */
    var i, a;
    for (i = S.actives.length - 1; i >= 0; i--) {
      a = S.actives[i];
      a.t += dt;
      if (!a.out && a.t >= a.dur - 0.22) {
        a.out = true;
        a.el.classList.remove('in');
        a.el.classList.add('out');
      }
      if (a.t >= a.dur) {
        if (a.el.parentNode) a.el.parentNode.removeChild(a.el);
        S.actives.splice(i, 1);
      }
    }
    while (S.actives.length < 3 && S.queue.length) {
      var b = S.queue.shift();
      var el = document.createElement('div');
      el.className = 'bb-bn bb-bn-' + b.style;
      var m = document.createElement('span');
      m.className = 'm'; m.textContent = b.main;
      el.appendChild(m);
      if (b.sub) {
        var s = document.createElement('span');
        s.className = 's'; s.textContent = b.sub;
        el.appendChild(s);
      }
      els.bnbox.appendChild(el);
      void el.offsetWidth;                          /* 强制 reflow 触发从右滑入 */
      el.classList.add('in');
      S.actives.push({ el: el, t: 0, dur: BN_DUR[b.style] || 1.3, out: false });
    }
  }

  /* ---------- 飘字 ---------- */
  function popup(text, worldPos) {
    if (!els.pops) return;
    var w = root.innerWidth || 1280, h = root.innerHeight || 720;
    var x = w / 2, y = h * 0.38;
    if (worldPos) {
      if (worldPos.isVector3 && UI._camera && typeof worldPos.clone === 'function') {
        try {
          var v = worldPos.clone().project(UI._camera);
          if (isFinite(v.x) && isFinite(v.y) && v.z < 1) {
            x = (v.x * 0.5 + 0.5) * w;
            y = (-v.y * 0.5 + 0.5) * h;
          }
        } catch (e) { /* 投影失败退回屏幕中央 */ }
      } else if (!worldPos.isVector3 &&
                 typeof worldPos.x === 'number' && typeof worldPos.y === 'number') {
        x = worldPos.x; y = worldPos.y;             /* 当屏幕坐标用 */
      }
    }
    if (!isFinite(x) || !isFinite(y)) return;
    var el = document.createElement('span');
    el.className = 'bb-pop' + (String(text) === '+3' ? ' gold' : '');
    el.textContent = text;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    els.pops.appendChild(el);
    S.pops.push({ el: el, t: 0, dur: 1.1, y: y });
    if (S.pops.length > 8) {
      var old = S.pops.shift();
      if (old.el.parentNode) old.el.parentNode.removeChild(old.el);
    }
  }
  function stepPops(dt) {
    for (var i = S.pops.length - 1; i >= 0; i--) {
      var p = S.pops[i];
      p.t += dt;
      var k = p.t / p.dur;
      if (k >= 1) {
        if (p.el.parentNode) p.el.parentNode.removeChild(p.el);
        S.pops.splice(i, 1);
        continue;
      }
      p.el.style.top = (p.y - k * 70) + 'px';
      p.el.style.opacity = String(1 - k * k);
      p.el.style.transform = 'translate(-50%,-50%) scale(' + (1 + k * 0.35) + ') rotate(-5deg)';
    }
  }

  /* ---------- 结算 ---------- */
  function onGameEnd(d) {
    d = d || {};
    var st = null;
    try { st = (api && api.getState) ? api.getState() : null; } catch (e) {}
    if (st && st.training) return;   /* v1.2 C3 训练中结算屏不出现（防御，game 不会发） */
    S.playing = false; S.paused = false;
    if (!els.result) return;
    hide(els.hud); hide(els.pause);
    if (els.post) els.post.style.display = 'none';
    if (els.meter) { els.meter.style.display = 'none'; S.meterFreeze = 0; S.meterVisible = false; }
    var stats = d.stats || (st && st.stats) || {};
    var sc = (st && st.score) || [0, 0];
    var win = d.winner === 0;
    els.resTitle.textContent = win ? '胜利！' : '惜败…';
    els.resTitle.classList.toggle('lose', !win);
    els.resSub.textContent = win ? 'KING OF THE COURT' : 'RUN IT BACK…';
    els.resStats.innerHTML =
      '<div class="r"><span>最终比分</span><b>我 ' + (sc[0] | 0) + ' : ' + (sc[1] | 0) + ' AI</b></div>' +
      '<div class="r"><span>扣篮</span><b>' + (stats.dunks || 0) + '</b></div>' +
      '<div class="r"><span>晃倒</span><b>' + (stats.ankles || 0) + '</b></div>' +
      '<div class="r"><span>三分</span><b>' + (stats.threes || 0) + '</b></div>' +
      '<div class="r"><span>盖帽</span><b>' + (stats.blocks || 0) + '</b></div>';
    els.result.style.display = 'flex';
  }

  /* ---------- 事件总线（只绑一次；handler 内部自守卫，无 DOM 也不炸） ---------- */
  function bindEvents() {
    if (bound || !BB.events || !BB.events.on) return;
    bound = true;
    var on = BB.events.on;
    on('ankle', function (d) {
      d = d || {};
      if (d.level === 2) banner('晃倒了！', 'ANKLE BREAKER!', 'ankle');
      else banner('打滑了！', '', 'small');
    });
    on('dunk:slam', function (d) {
      d = d || {};
      if (d.poster) banner('隔扣！', 'POSTERIZED!', 'poster');
      else banner('暴扣！', 'SLAM DUNK!', 'gold');
      /* v1.2 C1：扣篮条也定格品质变色（AI 扣篮时条未显示，freezeMeter 自守卫） */
      freezeMeter(d.perfect ? 'perfect' : 'good');
    });
    on('score', function (d) {
      d = d || {};
      if (d.type === 'three') banner('三分！', 'FROM DOWNTOWN', 'gold');
      var wp = null;
      if (typeof THREE !== 'undefined' && BB.C && BB.C.RIM) {
        wp = new THREE.Vector3(BB.C.RIM.x, BB.C.RIM.y + 0.6, BB.C.RIM.z);
      }
      popup('+' + (d.points || 2), wp);
    });
    on('shot:release', function (d) {
      d = d || {};
      if (d.quality === 'perfect' && (d.who === undefined || d.who === 0)) {
        banner('完美出手！', 'PERFECT RELEASE', 'gold');
      }
      freezeMeter(d.quality);
    });
    on('shot:miss', function (d) {
      if (d && d.airball) banner('三不沾…', 'AIRBALL', 'gray');
    });
    /* v1.2 C2：'block' 负载 {who, chase}——追帽走专属横幅 */
    on('block', function (d) {
      if (d && d.chase) banner('追帽！', 'CHASE-DOWN!', 'chase');
      else banner('火锅大帽！', 'REJECTED!', 'norm');
    });
    on('steal', function () { banner('抢断！', 'STEAL!', 'norm'); });
    on('hot', function (d) { if (d && d.on) banner('手感火热！', 'ON FIRE!', 'gold'); });
    /* v1.1：扣飞横幅（灰橙）；v1.2 扣篮条定格红色 */
    on('dunk:miss', function () {
      banner('扣飞了！', 'MISSED DUNK…', 'miss');
      freezeMeter('bad');
    });
    /* v1.1：背打模式 HUD 角标（仅玩家） */
    on('post:enter', function (d) {
      if (els.post && (!d || d.who === 0 || d.who === undefined)) els.post.style.display = 'block';
    });
    on('post:exit', function (d) {
      if (els.post && (!d || d.who === 0 || d.who === undefined)) els.post.style.display = 'none';
    });
    on('ui:banner', function (d) { d = d || {}; banner(d.main, d.sub, d.style); });
    on('checkball', function () {
      banner('发球！', 'CHECK BALL', 'small');
      if (els.post) els.post.style.display = 'none';
    });
    on('shotclock:low', function () { if (els.clock) els.clock.classList.add('low'); });
    on('game:start', function () {
      S.playing = true; S.paused = false;
      hide(els.menu); hide(els.result); hide(els.pause);
      show(els.hud);
    });
    on('game:end', onGameEnd);
  }

  /* ---------- 每帧更新 ---------- */
  function update(dt) {
    dt = (typeof dt === 'number' && isFinite(dt) && dt > 0) ? Math.min(dt, 0.1) : 1 / 60;
    if (!HAS_DOC || !els.root) {                    /* 无 DOM：清空队列即可 */
      S.queue.length = 0;
      S.pops.length = 0;
      return;
    }
    if (S.playing && !S.paused) {
      S.hudT -= dt;
      if (S.hudT <= 0) { S.hudT = 0.12; refreshHud(); }
    }
    if (S.meterFreeze > 0) {
      S.meterFreeze -= dt;
      if (S.meterFreeze <= 0) {                     /* 定格结束，收起投篮条 */
        S.meterFreeze = 0;
        S.meterVisible = false;
        els.mptr.style.boxShadow = 'none';
        if (els.mfill) { els.mfill.style.background = ''; els.mfill.style.boxShadow = ''; }
        els.meter.style.display = 'none';
      }
    }
    stepBanner(dt);
    stepPops(dt);
  }

  /* ---------- 对外 API ---------- */
  var UI = BB.UI = {
    _camera: null,                                  /* game.js 注入相机供飘字投影 */
    init: function (gameApi) {
      api = gameApi || api;
      bindEvents();
      if (!HAS_DOC || inited) return;
      inited = true;
      buildDom();
      document.addEventListener('keydown', onKey);
    },
    update: update,
    showMeter: showMeter,
    hideMeter: hideMeter,
    banner: banner,
    popup: popup
  };
})();

</script>
<script>
/* ai.js —— AI 对手大脑（AI程序员）
 * 契约（docs/ARCHITECTURE.md）：
 *   BB.AI.create(difficulty) -> brain      difficulty: 'rookie'|'pro'|'allstar'|'hof'
 *   BB.AI.update(brain, dt, view) -> ctrl  输出与玩家输入同构的「虚拟手柄」
 * ctrl = { moveX, moveZ, sprint, shootHold, shootRelease, dunk,
 *          cross, btb, legs, spin, hesi, stepback, fake, steal, block }
 *   —— 布尔为边沿语义（触发那一帧为 true）；shootHold 为电平（按住蓄力）；
 *      shootRelease 单帧；moveX/moveZ ∈ [-1,1]（世界坐标轴）。
 *
 * 防守状态机：POSITION(人筐连线距持球人1.2m滑步，对方冲刺则跟着sprint)
 *           → PRESS(对方三威胁站定时上压到0.8m)
 *           → REACT(识别到对方花式/急变向后，冻结 reactionDelay 秒)
 *           → CHASE(被一步过后回追：跑向对方与篮筐连线中点)
 *           + STEAL / BLOCK 为状态内概率边沿输出。
 * 进攻状态机：CLEAR(mustClear 先运出三分线) → SETUP(弧顶/45°要位)
 *           → MOVES(按 fancyFreq 起手花式，0.6~1s 内可接第二个不同花式吃连招加成)
 *           → DECIDE(突破/扣篮/跳投/后撤三分/假投/继续晃)
 *           → DRIVE / STEPBACK / FAKEWAIT / SHOOT(蓄力按 shotIQ 时机释放) / DUNK / POST
 *           14秒剩<3s 强出手；球 loose 全速冲预测落点。
 *
 * 纯数值运算，不依赖 THREE；view 所有字段判空；禁止 ES modules。
 */
(function () {
  'use strict';
  var BB = window.BB = window.BB || {};

  /* ================= 本地工具（防御 base.js 尚未加载的极端情况） ================= */
  function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }
  function rand(a, b) { return a + Math.random() * (b - a); }
  function damp(cur, tgt, k, dt) { return cur + (tgt - cur) * (1 - Math.exp(-k * dt)); }
  function num(v, d) { return (typeof v === 'number' && isFinite(v)) ? v : d; }
  function dist(ax, az, bx, bz) { var dx = ax - bx, dz = az - bz; return Math.sqrt(dx * dx + dz * dz); }
  function choose(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  /* 近似高斯噪声，范围约 [-1,1]，标准差约 0.33 */
  function gau() { return (Math.random() + Math.random() + Math.random() - 1.5) / 1.5; }
  /* 点 P 到线段 AB 的 2D 距离 */
  function segDist(px, pz, ax, az, bx, bz) {
    var dx = bx - ax, dz = bz - az;
    var L2 = dx * dx + dz * dz;
    if (L2 < 1e-8) return dist(px, pz, ax, az);
    var t = clamp(((px - ax) * dx + (pz - az) * dz) / L2, 0, 1);
    return dist(px, pz, ax + dx * t, az + dz * t);
  }

  function C() { return BB.C || {}; }
  function TPR() { return num(C().TP_R, 6.75); }
  function clampX(x) { return clamp(x, num(C().COURT_MINX, -7.5) + 0.35, num(C().COURT_MAXX, 7.5) - 0.35); }
  function clampZ(z) { return clamp(z, num(C().COURT_MINZ, -14) + 0.35, num(C().COURT_MAXZ, 0) - 0.35); }

  var CHARGE_FULL = 1.0;                  // v1.2 C1：投篮蓄力 0.85→1.0s 满（与 game.js METER_TIME 同步）
  var RELEASE_PCT = 0.62;                 // 目标释放点
  var FANCY = ['cross', 'btb', 'legs', 'hesi', 'spin'];

  /* ================= 难度参数表 ================= */

    /* reactionDelay 反应延迟s | stealFreq 抢断欲望/s（v1.1 C5 降半） | blockIQ 盖帽判断 |
       shotNoise 释放点噪声(±) | fancyMin/Max 花式间隔s | comboChance 连招率 |
       dunkHunger 路径通时扣篮欲 | posterHunger 防守人在身前也硬扣(隔扣欲) |
       stepbackChance 后撤三分 | fakeChance 假投 | driveIQ 主动突破倾向 |
       postChance 背打起手概率(v1.1 C1，allstar/hof) */
    rookie:  { reactionDelay: 0.45, stealFreq: 0.05, blockIQ: 0.15, shotNoise: 0.16,
               fancyMin: 4.0, fancyMax: 7.0, comboChance: 0.15, dunkHunger: 0.35,
               posterHunger: 0.06, stepbackChance: 0.05, fakeChance: 0.10, driveIQ: 0.35,
               postChance: 0 },
    pro:     { reactionDelay: 0.30, stealFreq: 0.11, blockIQ: 0.35, shotNoise: 0.09,
               fancyMin: 3.5, fancyMax: 6.0, comboChance: 0.35, dunkHunger: 0.60,
               posterHunger: 0.22, stepbackChance: 0.15, fakeChance: 0.14, driveIQ: 0.55,
               postChance: 0 },
    allstar: { reactionDelay: 0.18, stealFreq: 0.19, blockIQ: 0.60, shotNoise: 0.05,
               fancyMin: 3.0, fancyMax: 5.2, comboChance: 0.60, dunkHunger: 0.88,
               posterHunger: 0.55, stepbackChance: 0.30, fakeChance: 0.16, driveIQ: 0.75,
               postChance: 0.22 },
    hof:     { reactionDelay: 0.08, stealFreq: 0.28, blockIQ: 0.85, shotNoise: 0.02,
               fancyMin: 3.0, fancyMax: 5.0, comboChance: 0.85, dunkHunger: 1.00,
               posterHunger: 0.92, stepbackChance: 0.45, fakeChance: 0.18, driveIQ: 0.90,
               postChance: 0.33 }
  };

  /* ================= ctrl 构造 ================= */
  function blankCtrl() {
    return {
      moveX: 0, moveZ: 0, sprint: false,
      shootHold: false, shootRelease: false, dunk: false,
      cross: false, btb: false, legs: false, spin: false, hesi: false,
      stepback: false, fake: false, steal: false, block: false,
      post: false
    };
  }
  function sanitize(ctrl) {
    ctrl.moveX = isFinite(ctrl.moveX) ? clamp(ctrl.moveX, -1, 1) : 0;
    ctrl.moveZ = isFinite(ctrl.moveZ) ? clamp(ctrl.moveZ, -1, 1) : 0;
    ctrl.sprint = !!ctrl.sprint; ctrl.shootHold = !!ctrl.shootHold;
    ctrl.shootRelease = !!ctrl.shootRelease; ctrl.dunk = !!ctrl.dunk;
    ctrl.cross = !!ctrl.cross; ctrl.btb = !!ctrl.btb; ctrl.legs = !!ctrl.legs;
    ctrl.spin = !!ctrl.spin; ctrl.hesi = !!ctrl.hesi; ctrl.stepback = !!ctrl.stepback;
    ctrl.fake = !!ctrl.fake; ctrl.steal = !!ctrl.steal; ctrl.block = !!ctrl.block;
    ctrl.post = !!ctrl.post;
    return ctrl;
  }

  /* ================= view 防御式解析 ================= */
  function readView(view) {
    var me = view.me || {}, foe = view.foe || {}, ball = view.ball || {};
    var mp = me.pos || {}, mv = me.vel || {};
    var fp = foe.pos || {}, fv = foe.vel || {};
    var bp = ball.pos || {}, bv = ball.vel || {};
    var rim = view.rim || C().RIM || { x: 0, y: 3.05, z: -12.425 };
    var st = ball.state;
    var s = {
      mx: num(mp.x, 0), mz: num(mp.z, -7),
      mvx: num(mv.x, 0), mvz: num(mv.z, 0),
      meHasBall: !!me.hasBall, meStumbled: !!me.stumbled, meAir: !!me.airborne,
      fx: num(fp.x, 0), fz: num(fp.z, -7),
      fvx: num(fv.x, 0), fvz: num(fv.z, 0),
      foeHasBall: !!foe.hasBall, foeStumbled: !!foe.stumbled, foeAir: !!foe.airborne,
      bx: num(bp.x, 0), by: num(bp.y, 0.5), bz: num(bp.z, -7),
      bvx: num(bv.x, 0), bvy: num(bv.y, 0), bvz: num(bv.z, 0),
      ballLoose: st === 'loose', ballShot: st === 'shot',
      rx: num(rim.x, 0), rz: num(rim.z, -12.425),
      shotClock: num(view.shotClock, 14),
      mustClear: !!view.mustClear,
      training: !!view.training    /* v1.2 C3 训练模式感知 */
    };
    s.distFoe = dist(s.mx, s.mz, s.fx, s.fz);
    s.distRim = dist(s.mx, s.mz, s.rx, s.rz);
    s.foeDistRim = dist(s.fx, s.fz, s.rx, s.rz);
    s.foeSpeed = Math.sqrt(s.fvx * s.fvx + s.fvz * s.fvz);
    return s;
  }

  /* ================= create ================= */
  function create(difficulty) {
    var key = (typeof difficulty === 'string' && DIFF[difficulty]) ? difficulty : 'pro';
    return {
      difficulty: key, P: DIFF[key],
      t: 0, mode: '',
      /* 移动平滑 */
      wantX: 0, wantZ: 0, smx: 0, smz: 0,
      /* 防守 */
      dstate: 'POSITION', freezeT: 0, freezeCd: 0, stealCd: 0,
      blockAt: 0, foeAirP: false, pfvx: 0, pfvz: 0, pfsp: 0,
      pressT: 0, pressHold: 0, pressNeed: 0.7,
      /* v1.1 C5 抢断失败追踪：连续两次失败 → 4s 冷却 */
      stealFails: 0, stealBanUntil: 0, stealEval: 0,
      /* 进攻 */
      ostate: 'SETUP', oT: 0, poss: 0, spot: null,
      fancyT: 1.5, lastFancy: '', comboAt: 0, comboMove: '', decideAt: 0,
      chargeT: 0, chargeTarget: RELEASE_PCT, shootCd: 0, dunkCd: 0,
      driveT: 0, driveSide: 1,
      /* v1.1 C1 背打 */
      wantPost: false, postDone: false, postHold: 0, postMove: '',
      /* 节奏抖动 */
      jitT: 0, jx: 0, jz: 0
    };
  }

  function resetMode(brain, mode) {
    brain.mode = mode;
    brain.smx *= 0.5; brain.smz *= 0.5;
    if (mode === 'OFF') {
      brain.ostate = 'SETUP'; brain.oT = 0; brain.poss = 0;
      brain.spot = null; brain.lastFancy = ''; brain.comboAt = 0; brain.decideAt = 0;
      brain.chargeT = 0; brain.driveT = 0;
      /* v1.1 C1：allstar/hof 本回合按概率决定背打起手 */
      brain.wantPost = Math.random() < num(brain.P.postChance, 0);
      brain.postDone = false;
      /* 拿球后第一个花式来得快一些 */
      brain.fancyT = rand(brain.P.fancyMin, brain.P.fancyMax) * rand(0.3, 0.55);
    } else if (mode === 'DEF') {
      brain.dstate = 'POSITION'; brain.freezeT = 0; brain.blockAt = 0;
      brain.pressT = 0; brain.pressHold = 0; brain.pressNeed = rand(0.5, 1.0);
    }
  }

  /* ================= 移动辅助 ================= */
  /* 朝目标点移动，写入 brain.wantX/Z（含近距离减速与死区，避免抽搐），返回距离 */
  function seek(brain, s, tx, tz, gain) {
    var dx = tx - s.mx, dz = tz - s.mz;
    var d = Math.sqrt(dx * dx + dz * dz);
    if (d < 0.18) { brain.wantX = 0; brain.wantZ = 0; return d; }
    var sc = clamp(d / 0.9, 0.35, 1) * (gain || 1);
    brain.wantX = dx / d * sc;
    brain.wantZ = dz / d * sc;
    return d;
  }

  function finalizeMove(brain, s, dt, ctrl, k) {
    brain.smx = damp(brain.smx, brain.wantX, k, dt);
    brain.smz = damp(brain.smz, brain.wantZ, k, dt);
    if (Math.abs(brain.smx) < 0.02) brain.smx = 0;
    if (Math.abs(brain.smz) < 0.02) brain.smz = 0;
    /* 出界防护：贴边不再往外推 */
    if (s) {
      var mnx = num(C().COURT_MINX, -7.5) + 0.3, mxx = num(C().COURT_MAXX, 7.5) - 0.3;
      var mnz = num(C().COURT_MINZ, -14) + 0.3, mxz = num(C().COURT_MAXZ, 0) - 0.3;
      if (s.mx <= mnx && brain.smx < 0) brain.smx = 0;
      if (s.mx >= mxx && brain.smx > 0) brain.smx = 0;
      if (s.mz <= mnz && brain.smz < 0) brain.smz = 0;
      if (s.mz >= mxz && brain.smz > 0) brain.smz = 0;
    }
    ctrl.moveX = clamp(brain.smx, -1, 1);
    ctrl.moveZ = clamp(brain.smz, -1, 1);
  }

  /* 防守人是否堵在我与篮筐的连线上（身前） */
  function pathBlocked(s, width) {
    var toRimX = s.rx - s.mx, toRimZ = s.rz - s.mz;
    var dRim = Math.sqrt(toRimX * toRimX + toRimZ * toRimZ) || 1;
    var front = ((s.fx - s.mx) * toRimX + (s.fz - s.mz) * toRimZ) / dRim;
    if (front < 0.15 || front > dRim + 0.4) return false;
    return segDist(s.fx, s.fz, s.mx, s.mz, s.rx, s.rz) < (width || 1.0);
  }

  /* ================= 进攻 ================= */
  function startShoot(brain, rushed, base) {
    var P = brain.P;
    brain.ostate = 'SHOOT'; brain.oT = 0; brain.chargeT = 0;
    var n = P.shotNoise * (rushed ? 1.5 : 1);
    brain.chargeTarget = clamp((base || RELEASE_PCT) + gau() * n * 2, 0.34, 0.95);
  }

  /* 篮下终结：按 dunkHunger/posterHunger 决定硬扣还是快速出手 */
  function rimAttack(brain, s, ctrl) {
    var P = brain.P;
    if (s.meAir) return;
    var blocked = pathBlocked(s, 1.0);
    var go = false;
    if (brain.t >= brain.dunkCd) {
      /* 高难度专挑防守人在身前时硬扣，制造隔扣（GDD §6） */
      go = blocked ? (Math.random() < P.posterHunger) : (Math.random() < P.dunkHunger);
    }
    if (go) {
      ctrl.dunk = true; ctrl.sprint = true;
      brain.dunkCd = brain.t + 2.0;
      brain.ostate = 'DUNK'; brain.oT = 0;
    } else {
      startShoot(brain, true, 0.50); /* 快出手上篮/抛投 */
    }
  }

  function pickFancy(brain) {
    var pool = [], i;
    for (i = 0; i < FANCY.length; i++) if (FANCY[i] !== brain.lastFancy) pool.push(FANCY[i]);
    return choose(pool);
  }

  function pickSpot(brain, s) {
    var top = { x: 0, z: s.rz + TPR() + 0.9 };
    var wl = { x: -4.9, z: s.rz + 5.0 };
    var wr = { x: 4.9, z: s.rz + 5.0 };
    var spots = [top, wl, wr], best = top, bd = 1e9, i, d;
    if (Math.random() < 0.6) {           /* 60% 就近要位，40% 随机换个位 */
      for (i = 0; i < 3; i++) {
        d = dist(s.mx, s.mz, spots[i].x, spots[i].z);
        if (d < bd) { bd = d; best = spots[i]; }
      }
